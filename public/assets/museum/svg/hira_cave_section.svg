<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <title>Hira Mağarası — Kesit Çizimi / Cave of Ḥirāʾ — Cross Section</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B8D4E8"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="50%" stop-color="#6B5B3F"/>
      <stop offset="100%" stop-color="#5A4A2F"/>
    </linearGradient>
    <pattern id="rockTex" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect width="15" height="15" fill="#6B5B3F"/>
      <circle cx="5" cy="5" r="2" fill="#5A4A2F" opacity="0.5"/>
      <circle cx="12" cy="10" r="1.5" fill="#7A6548" opacity="0.4"/>
    </pattern>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FDF8F0"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C1810">Hira Mağarası (Cebel-i Nûr) — Kesit Çizimi</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#666">Cave of Ḥirāʾ (Jabal al-Nūr) — Cross Section | غار حراء (جبل النور)</text>
  <text x="400" y="68" text-anchor="middle" font-size="11" fill="#888">DSM-GEO-C001 | İlk Vahiy Yeri / Site of First Revelation (610 CE)</text>
  
  <!-- Sky -->
  <rect x="0" y="80" width="800" height="200" fill="url(#sky)"/>
  
  <!-- Mountain profile -->
  <path d="M 0 400 L 80 350 L 150 300 L 220 250 L 280 200 L 330 160 L 380 130 L 420 115 L 460 130 L 500 160 L 540 200 L 580 240 L 640 290 L 700 340 L 760 370 L 800 400" fill="url(#rockTex)" stroke="#4A3A2A" stroke-width="2"/>
  
  <!-- Cave interior (cutaway) -->
  <path d="M 340 230 Q 360 220, 380 225 Q 400 215, 420 225 L 430 240 Q 435 260, 430 280 L 425 310 Q 420 330, 400 335 Q 380 340, 360 335 Q 345 325, 340 310 L 338 280 Q 335 255, 340 230 Z" fill="#D4C4A8" stroke="#4A3A2A" stroke-width="1.5"/>
  
  <!-- Cave opening -->
  <path d="M 345 230 Q 350 220, 360 215 Q 370 218, 375 225" fill="none" stroke="#4A3A2A" stroke-width="2.5"/>
  
  <!-- Cave floor -->
  <line x1="345" y1="330" x2="420" y2="330" stroke="#6B5B3F" stroke-width="1.5"/>
  
  <!-- Person silhouette (sitting, for scale) -->
  <g transform="translate(375,295)">
    <circle cx="0" cy="-20" r="6" fill="#444" opacity="0.6"/>
    <path d="M -8 -14 Q -10 0, -12 10 L 12 10 Q 10 0, 8 -14" fill="#444" opacity="0.6"/>
    <text x="20" y="-5" font-size="8" fill="#444">~1.7 m (kişi)</text>
  </g>
  
  <!-- Cave dimensions -->
  <!-- Width -->
  <line x1="342" y1="350" x2="428" y2="350" stroke="#555" stroke-width="0.8" marker-start="url(#arr-r)" marker-end="url(#arr)"/>
  <text x="385" y="365" text-anchor="middle" font-size="10" fill="#555">~2 × 1.5 m (giriş)</text>
  
  <!-- Depth -->
  <line x1="440" y1="230" x2="440" y2="330" stroke="#555" stroke-width="0.8" marker-start="url(#arr-r)" marker-end="url(#arr)"/>
  <text x="455" y="285" font-size="10" fill="#555">~3.5 m</text>
  <text x="455" y="298" font-size="8" fill="#777">derinlik</text>
  
  <!-- Altitude indicator -->
  <line x1="100" y1="115" x2="100" y2="400" stroke="#2E86C1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="115" x2="110" y2="115" stroke="#2E86C1" stroke-width="1"/>
  <line x1="90" y1="400" x2="110" y2="400" stroke="#2E86C1" stroke-width="1"/>
  <text x="95" y="260" text-anchor="end" font-size="10" fill="#2E86C1" transform="rotate(-90,95,260)">634 m (rakım / altitude)</text>
  
  <!-- Ground level -->
  <rect x="0" y="400" width="800" height="130" fill="#C4A882" opacity="0.3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#8B7355" stroke-width="1.5"/>
  <text x="60" y="420" font-size="9" fill="#8B7355">Mekke Ovası / Mecca Plain (~277 m)</text>
  
  <!-- Direction to Mecca -->
  <line x1="380" y1="420" x2="380" y2="460" stroke="#C0392B" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="395" y="445" font-size="9" fill="#C0392B">Mekke'ye ~4.8 km ↓</text>
  
  <!-- Opening direction -->
  <line x1="335" y1="220" x2="280" y2="180" stroke="#C0392B" stroke-width="1" marker-end="url(#arr)"/>
  <text x="250" y="175" text-anchor="end" font-size="9" fill="#C0392B">Giriş yönü: Kâbe'ye</text>
  <text x="250" y="188" text-anchor="end" font-size="8" fill="#C0392B">doğru açılır</text>
  
  <!-- Annotation: First revelation -->
  <g transform="translate(520,150)">
    <rect x="0" y="0" width="240" height="65" fill="#FDF8F0" stroke="#C4A882" stroke-width="1" rx="5" opacity="0.95"/>
    <text x="120" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#C0392B">İlk Vahiy — 610 M (Ramazan)</text>
    <text x="10" y="35" font-size="9" fill="#333">اقْرَأْ بِاسْمِ رَبِّكَ الَّذِي خَلَقَ</text>
    <text x="10" y="50" font-size="8" fill="#666">"Yaratan Rabbinin adıyla oku!" (Alak 1-5)</text>
    <text x="10" y="62" font-size="8" fill="#666">"Read in the name of your Lord" (ʿAlaq 1-5)</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30,475)">
    <rect x="0" y="0" width="340" height="100" fill="#FDF8F0" stroke="#C4A882" stroke-width="1" rx="5"/>
    <text x="170" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C1810">Bilgi / Information</text>
    <text x="10" y="35" font-size="9" fill="#333">• Konum: Mekke kuzeydoğusu, ~4.8 km</text>
    <text x="10" y="50" font-size="9" fill="#333">• Rakım: ~634 m (zirve) | ~357 m yükseklik tırmanışı</text>
    <text x="10" y="65" font-size="9" fill="#333">• Mağara: Küçük kaya oyuğu; ~2×1.5 m giriş, ~3.5 m derin</text>
    <text x="10" y="80" font-size="9" fill="#333">• Hz. Peygamber tehannüs (inziva) için gelirdi</text>
    <text x="10" y="93" font-size="8" fill="#888">Malzeme: Granit kaya / Granite rock formation</text>
  </g>
  
  <!-- Scale bar -->
  <g transform="translate(550,530)">
    <text x="80" y="-5" text-anchor="middle" font-size="9" fill="#555">Mağara Ölçeği / Cave Scale</text>
    <line x1="0" y1="0" x2="160" y2="0" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="1.5"/>
    <line x1="80" y1="-4" x2="80" y2="4" stroke="#333" stroke-width="1.5"/>
    <line x1="160" y1="-4" x2="160" y2="4" stroke="#333" stroke-width="1.5"/>
    <text x="0" y="15" text-anchor="middle" font-size="8" fill="#555">0</text>
    <text x="80" y="15" text-anchor="middle" font-size="8" fill="#555">2 m</text>
    <text x="160" y="15" text-anchor="middle" font-size="8" fill="#555">4 m</text>
  </g>
</svg>
