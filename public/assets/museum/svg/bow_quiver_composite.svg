<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bowWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#A0792E"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
    <linearGradient id="quiverLeather" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B3A2A"/>
      <stop offset="50%" stop-color="#7D4A35"/>
      <stop offset="100%" stop-color="#5C2E1E"/>
    </linearGradient>
    <linearGradient id="arrowSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#00000025"/>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="#FAFAF5"/>
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="#D4C5A0" stroke-width="1"/>
  <rect x="25" y="25" width="750" height="450" fill="none" stroke="#D4C5A0" stroke-width="0.5"/>
  
  <!-- Title -->
  <text x="400" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2C1810" font-weight="bold">قَوْسٌ عَرَبِيَّة وَسَدَق</text>
  <text x="400" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C4330">Arab Composite Bow &amp; Quiver (Sadak)</text>
  <text x="400" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" font-style="italic">7th Century Hejazi Type</text>

  <!-- Bow - curved shape -->
  <g transform="translate(200, 280)" filter="url(#shadow2)">
    <!-- Bow limbs - recurve shape -->
    <path d="M 0,-140 
             C 15,-130 25,-80 20,-40
             C 15,0 12,40 20,80
             C 25,120 15,130 0,140" 
          fill="none" stroke="url(#bowWood)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Sinew wrapping at grip -->
    <rect x="-8" y="-20" width="16" height="40" rx="4" fill="#5C4330" stroke="#3A2510" stroke-width="0.5"/>
    <line x1="-6" y1="-15" x2="-6" y2="15" stroke="#7A5C10" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="6" y1="-15" x2="6" y2="15" stroke="#7A5C10" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Recurve tips -->
    <path d="M 0,-140 C -8,-150 -12,-155 -8,-162" fill="none" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    <path d="M 0,140 C -8,150 -12,155 -8,162" fill="none" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    
    <!-- String nocks -->
    <circle cx="-8" cy="-162" r="2.5" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="-8" cy="162" r="2.5" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>
    
    <!-- Bowstring -->
    <line x1="-8" y1="-162" x2="-8" y2="162" stroke="#8B7355" stroke-width="1.5"/>
  </g>

  <!-- Arrow detail (separate) -->
  <g transform="translate(330, 180)" filter="url(#shadow2)">
    <!-- Arrow shaft -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="#A0792E" stroke-width="3"/>
    
    <!-- Arrowhead (triangular, iron) -->
    <polygon points="200,-6 220,0 200,6" fill="url(#arrowSteel)" stroke="#666" stroke-width="0.5"/>
    
    <!-- Fletching -->
    <path d="M 15,-8 L 0,-2 L 15,0" fill="#D4C5A0" stroke="#8B7355" stroke-width="0.5"/>
    <path d="M 15,8 L 0,2 L 15,0" fill="#E8DCC8" stroke="#8B7355" stroke-width="0.5"/>
    
    <!-- Nock -->
    <rect x="-3" y="-2" width="5" height="4" rx="1" fill="#5C4330"/>
  </g>

  <!-- Quiver (Sadak/Kinana) -->
  <g transform="translate(580, 160)" filter="url(#shadow2)">
    <!-- Quiver body -->
    <path d="M 0,0 L 10,0 L 15,200 L -5,200 Z" fill="url(#quiverLeather)" stroke="#3A2510" stroke-width="1"/>
    
    <!-- Decorative stitching -->
    <line x1="2" y1="20" x2="12" y2="20" stroke="#8B6914" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="2" y1="40" x2="12" y2="40" stroke="#8B6914" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="1" y1="170" x2="13" y2="170" stroke="#8B6914" stroke-width="0.5" stroke-dasharray="2,2"/>
    
    <!-- Strap ring -->
    <circle cx="12" cy="30" r="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    
    <!-- Arrow tips peeking out -->
    <polygon points="2,-8 6,-16 4,-8" fill="#C0C0C0" stroke="#888" stroke-width="0.3"/>
    <polygon points="6,-6 10,-14 8,-6" fill="#C0C0C0" stroke="#888" stroke-width="0.3"/>
    <polygon points="4,-5 8,-12 6,-5" fill="#C0C0C0" stroke="#888" stroke-width="0.3"/>
    
    <!-- Carrying strap -->
    <path d="M 12,30 C 30,25 35,40 30,60" fill="none" stroke="#6B3A2A" stroke-width="2"/>
  </g>

  <!-- Annotations -->
  <g font-family="Georgia, serif" font-size="9" fill="#5C4330">
    <line x1="192" y1="120" x2="140" y2="120" stroke="#8B7355" stroke-width="0.5"/>
    <text x="80" y="118" font-size="9">Recurve tips (siyah)</text>
    
    <line x1="200" y1="280" x2="140" y2="280" stroke="#8B7355" stroke-width="0.5"/>
    <text x="90" y="278" font-size="9">Grip (qabḍah)</text>
    
    <line x1="192" y1="442" x2="140" y2="442" stroke="#8B7355" stroke-width="0.5"/>
    <text x="80" y="440" font-size="9">String nock (fuq)</text>
    
    <!-- Arrow annotations -->
    <line x1="545" y1="180" x2="560" y2="200" stroke="#8B7355" stroke-width="0.5"/>
    <text x="545" y="212" font-size="9">Iron head (naṣl)</text>
    
    <line x1="345" y1="180" x2="345" y2="200" stroke="#8B7355" stroke-width="0.5"/>
    <text x="320" y="212" font-size="9">Fletching (rīsh)</text>
    
    <!-- Quiver annotations -->
    <line x1="620" y1="260" x2="660" y2="260" stroke="#8B7355" stroke-width="0.5"/>
    <text x="665" y="258" font-size="9">Leather body</text>
    <text x="665" y="270" font-size="8" fill="#8B7355" font-style="italic">(kinānah / sadak)</text>
  </g>

  <!-- Dimension lines -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#8B7355">
    <line x1="170" y1="118" x2="170" y2="442" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="158" y="280" text-anchor="end" transform="rotate(-90, 158, 280)">~110–130 cm (bow length)</text>
    
    <line x1="330" y1="165" x2="550" y2="165" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="440" y="160" text-anchor="middle">~70 cm (arrow)</text>
  </g>

  <!-- Material info -->
  <g font-family="Georgia, serif" font-size="10" fill="#5C4330">
    <text x="50" y="420" font-weight="bold">Materials:</text>
    <text x="125" y="420">Bow: Nab' wood, sinew, horn composite  |  Quiver: Tanned leather, iron fittings</text>
    
    <text x="50" y="438" font-weight="bold">Types:</text>
    <text x="100" y="438">Nushshāb (flight arrow), Nabl (war arrow), Sahm (hunting arrow)</text>
    
    <text x="50" y="456" font-weight="bold">Source:</text>
    <text x="105" y="456">Ibn Saʿd, al-Ṭabaqāt, I/488  |  al-Bukhārī, Jihād 78</text>
  </g>

  <text x="750" y="465" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#B8972D">DSM-WPN-002</text>
</svg>