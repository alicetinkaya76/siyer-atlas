<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="earthCut" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4A870"/>
      <stop offset="30%" stop-color="#B09060"/>
      <stop offset="70%" stop-color="#907048"/>
      <stop offset="100%" stop-color="#6B5030"/>
    </linearGradient>
    <linearGradient id="earthFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8C8A0"/>
      <stop offset="100%" stop-color="#C4B088"/>
    </linearGradient>
    <pattern id="earthTex" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#A08060" opacity="0.3"/>
      <circle cx="6" cy="5" r="0.4" fill="#907048" opacity="0.2"/>
      <circle cx="4" cy="7" r="0.3" fill="#B09060" opacity="0.25"/>
    </pattern>
    <filter id="sh6" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#FAFAF5"/>
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="#D4C5A0" stroke-width="1"/>
  <rect x="25" y="25" width="750" height="450" fill="none" stroke="#D4C5A0" stroke-width="0.5"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#2C1810" font-weight="bold">الْخَنْدَق — مَقْطَع عَرْضِيّ</text>
  <text x="400" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C4330">al-Khandaq — Cross Section (627 CE / 5 AH)</text>
  <text x="400" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" font-style="italic">The Trench of Medina — Defensive Engineering by Salmān al-Fārisī</text>

  <!-- CROSS SECTION VIEW -->
  <g transform="translate(100, 200)" filter="url(#sh6)">
    <!-- Ground level - left (Quraysh/Confederate side) -->
    <rect x="0" y="0" width="600" height="6" fill="#C4B088"/>
    <rect x="0" y="0" width="600" height="6" fill="url(#earthTex)"/>
    
    <!-- Labels for sides -->
    <text x="80" y="-15" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B4513" font-weight="bold">Confederate Side</text>
    <text x="80" y="-3" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B7355" font-style="italic">(Quraysh &amp; Ghaṭafān)</text>
    
    <text x="520" y="-15" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2C6B2F" font-weight="bold">Muslim Side</text>
    <text x="520" y="-3" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B7355" font-style="italic">(toward Medina)</text>

    <!-- Trench cut -->
    <path d="M 180,6 
             L 180,6 L 200,6 
             L 200,130 
             L 210,140 
             L 390,140 
             L 400,130 
             L 400,6 
             L 420,6"
          fill="url(#earthCut)" stroke="#6B5030" stroke-width="1"/>
    
    <!-- Earth texture in trench walls -->
    <path d="M 200,6 L 200,130 L 210,140 L 390,140 L 400,130 L 400,6"
          fill="url(#earthTex)" opacity="0.4"/>
    
    <!-- Trench floor -->
    <rect x="210" y="138" width="180" height="4" fill="#6B5030"/>
    
    <!-- Excavated earth mound (Muslim side) - glacis -->
    <path d="M 400,6 C 410,-10 430,-30 460,-35 C 490,-30 510,-10 530,6" 
          fill="url(#earthFill)" stroke="#A08060" stroke-width="0.8"/>
    <path d="M 400,6 C 410,-10 430,-30 460,-35 C 490,-30 510,-10 530,6" 
          fill="url(#earthTex)" opacity="0.3"/>

    <!-- Water at bottom (seasonal) -->
    <ellipse cx="300" cy="141" rx="80" ry="3" fill="#8BB8D0" opacity="0.3"/>
    
    <!-- Stones/rocks on trench floor -->
    <circle cx="250" cy="138" r="3" fill="#999" stroke="#777" stroke-width="0.3"/>
    <circle cx="280" cy="137" r="2" fill="#AAA" stroke="#888" stroke-width="0.3"/>
    <circle cx="320" cy="139" r="2.5" fill="#999" stroke="#777" stroke-width="0.3"/>
    <circle cx="360" cy="137" r="2" fill="#AAA" stroke="#888" stroke-width="0.3"/>
  </g>

  <!-- Dimension lines -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#8B7355">
    <!-- Width at top -->
    <line x1="300" y1="195" x2="500" y2="195" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="300" y1="190" x2="300" y2="200" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="500" y1="190" x2="500" y2="200" stroke="#B8972D" stroke-width="0.5"/>
    <text x="400" y="192" text-anchor="middle">~4.6 m / 10 dhirāʿ (top width)</text>
    
    <!-- Depth -->
    <line x1="520" y1="206" x2="520" y2="342" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="515" y1="206" x2="525" y2="206" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="515" y1="342" x2="525" y2="342" stroke="#B8972D" stroke-width="0.5"/>
    <text x="540" y="280" transform="rotate(90, 540, 280)" text-anchor="middle">~4.6 m / 10 dhirāʿ (depth)</text>
    
    <!-- Mound height -->
    <line x1="575" y1="165" x2="575" y2="206" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="570" y1="165" x2="580" y2="165" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="570" y1="206" x2="580" y2="206" stroke="#B8972D" stroke-width="0.5"/>
    <text x="590" y="188">~1.5 m</text>
    <text x="590" y="198" font-size="8">(earth glacis)</text>
  </g>

  <!-- TOP VIEW (small inset map) -->
  <g transform="translate(530, 120)">
    <rect x="0" y="0" width="220" height="150" rx="3" fill="#F5EDD8" stroke="#D4C5A0" stroke-width="1"/>
    <text x="110" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C4330" font-weight="bold">Plan View — NW Medina</text>
    
    <!-- Medina built area (simplified) -->
    <rect x="100" y="60" width="80" height="70" rx="3" fill="#E8DCC0" stroke="#B8A888" stroke-width="0.5"/>
    <text x="140" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8B7355">Medina</text>
    
    <!-- Trench line (NW) -->
    <path d="M 30,40 C 50,35 80,30 120,50" fill="none" stroke="#8B4513" stroke-width="2.5"/>
    <text x="60" y="30" font-family="Georgia, serif" font-size="7" fill="#8B4513" font-weight="bold">Khandaq</text>
    
    <!-- Mount Sal' -->
    <ellipse cx="70" cy="60" rx="20" ry="10" fill="#C4A870" stroke="#A08060" stroke-width="0.5"/>
    <text x="70" y="63" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#5C4330">Salʿ</text>
    
    <!-- Lava fields (Harra) -->
    <rect x="10" y="80" width="40" height="50" rx="2" fill="#888" opacity="0.2" stroke="#666" stroke-width="0.3"/>
    <text x="30" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#666">Ḥarra</text>
    
    <rect x="180" y="50" width="30" height="60" rx="2" fill="#888" opacity="0.2" stroke="#666" stroke-width="0.3"/>
    <text x="195" y="83" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#666">Ḥarra</text>
    
    <!-- Confederate army -->
    <text x="60" y="18" font-family="Georgia, serif" font-size="6" fill="#8B4513">⚔ 10,000</text>
    
    <!-- Muslim army -->
    <text x="110" y="45" font-family="Georgia, serif" font-size="6" fill="#2C6B2F">🛡 3,000</text>
    
    <!-- North arrow -->
    <polygon points="200,25 197,35 200,30 203,35" fill="#8B6914"/>
    <text x="200" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8B6914">N</text>
  </g>

  <!-- Engineering data -->
  <g transform="translate(50, 375)" font-family="Georgia, serif" font-size="10" fill="#5C4330">
    <text x="0" y="0" font-weight="bold" font-size="11">Engineering Specifications</text>
    
    <text x="0" y="22" font-weight="bold">Length:</text>
    <text x="55" y="22">~5.5 km along NW approaches (between two ḥarra lava fields)</text>
    
    <text x="0" y="40" font-weight="bold">Labor:</text>
    <text x="48" y="40">~3,000 men, 6 days  |  Each man dug ~10 dhirāʿ (4.6 m) section</text>
    
    <text x="0" y="58" font-weight="bold">Innovation:</text>
    <text x="80" y="58">Salmān al-Fārisī introduced Sasanian siege-trench technique to Arabia</text>
    
    <text x="0" y="76" font-weight="bold">Source:</text>
    <text x="55" y="76">al-Wāqidī, al-Maghāzī; Ibn Hishām, al-Sīrah; al-Bukhārī, Maghāzī 29</text>
  </g>

  <text x="750" y="475" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#B8972D">DSM-ARC-002 / DSM-WPN-005</text>
</svg>