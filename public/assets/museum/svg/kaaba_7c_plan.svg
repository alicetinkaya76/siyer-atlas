<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="Georgia, serif">
  <title>Kâbe-i Muazzama — 7. Yüzyıl Planı / al-Kaʿba al-Musharrafa — 7th Century Plan</title>
  <defs>
    <pattern id="stone" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#8B7355"/>
      <rect x="0" y="0" width="9" height="9" fill="#7A6548" rx="1"/>
      <rect x="11" y="11" width="9" height="9" fill="#7A6548" rx="1"/>
    </pattern>
    <marker id="dim-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="dim-arrow-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="700" fill="#FDF8F0"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C1810">Kâbe-i Muazzama — 7. Yüzyıl Planı</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#666">al-Kaʿba al-Musharrafa — Quraysh Reconstruction (605 CE) | الكعبة المشرفة</text>
  <text x="400" y="72" text-anchor="middle" font-size="11" fill="#888">DSM-GEO-S001 | Plan View</text>
  
  <!-- North arrow -->
  <g transform="translate(720,120)">
    <line x1="0" y1="30" x2="0" y2="-20" stroke="#333" stroke-width="2" marker-end="url(#dim-arrow)"/>
    <text x="0" y="-28" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">N</text>
  </g>
  
  <!-- Mataf (circumambulation area) -->
  <ellipse cx="380" cy="380" rx="230" ry="220" fill="none" stroke="#C4A882" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="600" y="250" font-size="10" fill="#C4A882" transform="rotate(25,600,250)">Matâf / Tavaf Alanı</text>
  
  <!-- Kaaba main structure -->
  <rect x="300" y="300" width="160" height="140" fill="url(#stone)" stroke="#2C1810" stroke-width="3" rx="2"/>
  <!-- Kiswa indication -->
  <rect x="303" y="303" width="154" height="134" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="3,3" rx="1"/>
  
  <!-- Kaaba label -->
  <text x="380" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">KÂBE</text>
  <text x="380" y="382" text-anchor="middle" font-size="10" fill="#DDD">الكعبة</text>
  
  <!-- Hacer-i Esved (Black Stone) - SE corner -->
  <circle cx="460" cy="440" r="8" fill="#1a1a1a" stroke="#C4A882" stroke-width="2"/>
  <text x="478" y="456" font-size="9" fill="#2C1810">Hacer-i Esved</text>
  <text x="478" y="468" font-size="8" fill="#666">الحجر الأسود</text>
  
  <!-- Door (east wall, elevated) -->
  <rect x="455" y="360" width="8" height="30" fill="#C4A882" stroke="#8B6914" stroke-width="1.5"/>
  <text x="472" y="372" font-size="9" fill="#8B6914">Kapı (Bâb)</text>
  <text x="472" y="383" font-size="8" fill="#666">~2.25 m yukarıda</text>
  
  <!-- Hicr-i İsmail (Hatim) -->
  <path d="M 300 300 Q 300 210, 380 210 Q 460 210, 460 300" fill="none" stroke="#2C1810" stroke-width="2.5"/>
  <path d="M 310 300 Q 310 220, 380 220 Q 450 220, 450 300" fill="#E8DCC8" fill-opacity="0.4" stroke="none"/>
  <text x="380" y="260" text-anchor="middle" font-size="11" fill="#2C1810">Hicr-i İsmâîl</text>
  <text x="380" y="275" text-anchor="middle" font-size="9" fill="#666">حِجر إسماعيل (الحطيم)</text>
  
  <!-- Mizab (rain spout) -->
  <rect x="370" y="296" width="20" height="8" fill="#C4A882" stroke="#8B6914" stroke-width="1"/>
  <text x="380" y="292" text-anchor="middle" font-size="8" fill="#8B6914">Mîzâb (Oluk)</text>
  
  <!-- Makam-i Ibrahim -->
  <rect x="475" y="350" width="10" height="10" fill="#C4A882" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <text x="495" y="350" font-size="9" fill="#8B6914">Makâm-ı İbrâhîm</text>
  <text x="495" y="362" font-size="8" fill="#666">مقام إبراهيم</text>
  
  <!-- Zemzem well direction -->
  <circle cx="500" cy="480" r="6" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <circle cx="500" cy="480" r="2" fill="#2E86C1"/>
  <text x="515" y="478" font-size="9" fill="#2E86C1">Zemzem</text>
  <text x="515" y="490" font-size="8" fill="#2E86C1">~20 m →</text>
  
  <!-- Rukn (corners) labels -->
  <text x="290" y="298" text-anchor="end" font-size="8" fill="#555">Rükn-i Irâkî</text>
  <text x="290" y="445" text-anchor="end" font-size="8" fill="#555">Rükn-i Yemânî</text>
  <text x="466" y="298" font-size="8" fill="#555">Rükn-i Şâmî</text>
  <text x="466" y="455" font-size="8" fill="#555">Rükn-i Hacerî Esved</text>
  
  <!-- Dimensions -->
  <!-- Length (N-S) -->
  <line x1="260" y1="300" x2="260" y2="440" stroke="#555" stroke-width="0.8" marker-start="url(#dim-arrow-rev)" marker-end="url(#dim-arrow)"/>
  <line x1="270" y1="300" x2="258" y2="300" stroke="#555" stroke-width="0.5"/>
  <line x1="270" y1="440" x2="258" y2="440" stroke="#555" stroke-width="0.5"/>
  <text x="255" y="375" text-anchor="end" font-size="10" fill="#555" transform="rotate(-90,255,375)">~12.86 m</text>
  
  <!-- Width (E-W) -->
  <line x1="300" y1="475" x2="460" y2="475" stroke="#555" stroke-width="0.8" marker-start="url(#dim-arrow-rev)" marker-end="url(#dim-arrow)"/>
  <line x1="300" y1="465" x2="300" y2="477" stroke="#555" stroke-width="0.5"/>
  <line x1="460" y1="465" x2="460" y2="477" stroke="#555" stroke-width="0.5"/>
  <text x="380" y="490" text-anchor="middle" font-size="10" fill="#555">~11.03 m</text>
  
  <!-- Height label -->
  <text x="380" y="510" text-anchor="middle" font-size="10" fill="#555">Yükseklik / Height: ~13.1 m</text>
  
  <!-- Safa-Merve direction -->
  <line x1="540" y1="380" x2="620" y2="380" stroke="#8B6914" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#dim-arrow)"/>
  <text x="580" y="395" text-anchor="middle" font-size="9" fill="#8B6914">Safâ →</text>
  
  <!-- Legend -->
  <g transform="translate(50,540)">
    <rect x="0" y="0" width="300" height="130" fill="#FDF8F0" stroke="#C4A882" stroke-width="1" rx="5"/>
    <text x="150" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C1810">Açıklama / Legend</text>
    
    <rect x="15" y="32" width="14" height="10" fill="url(#stone)" stroke="#2C1810" stroke-width="1"/>
    <text x="40" y="42" font-size="9" fill="#333">Kâbe duvarları (taş örgü / stone masonry)</text>
    
    <circle cx="22" cy="58" r="5" fill="#1a1a1a" stroke="#C4A882" stroke-width="1.5"/>
    <text x="40" y="62" font-size="9" fill="#333">Hacer-i Esved (Black Stone / الحجر الأسود)</text>
    
    <rect x="15" y="72" width="14" height="10" fill="#C4A882" stroke="#8B6914" stroke-width="1"/>
    <text x="40" y="82" font-size="9" fill="#333">Kapı, Makâm-ı İbrâhîm, Mîzâb</text>
    
    <line x1="15" y1="97" x2="29" y2="97" stroke="#C4A882" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="40" y="101" font-size="9" fill="#333">Matâf (tavaf dairesi / circumambulation)</text>
    
    <text x="15" y="120" font-size="8" fill="#888">Kureyş yeniden inşası (605 M) — Hicr kısmı dışarıda bırakıldı</text>
  </g>
  
  <!-- Materials & construction note -->
  <g transform="translate(420,540)">
    <rect x="0" y="0" width="330" height="130" fill="#FDF8F0" stroke="#C4A882" stroke-width="1" rx="5"/>
    <text x="165" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C1810">Yapı Bilgisi / Construction</text>
    <text x="15" y="40" font-size="9" fill="#333">• Malzeme: Mekke graniti + kireçtaşı</text>
    <text x="15" y="55" font-size="9" fill="#333">• Duvar kalınlığı: ~1 m</text>
    <text x="15" y="70" font-size="9" fill="#333">• Kapı yüksekliği: ~2.25 m (yerden)</text>
    <text x="15" y="85" font-size="9" fill="#333">• Çatı: Düz ahşap çatı (605 M onarımı)</text>
    <text x="15" y="100" font-size="9" fill="#333">• Hicr: İbrâhîm temeli dahilinde; Kureyş bütçe</text>
    <text x="15" y="113" font-size="9" fill="#333">  yetersizliğinden dışarıda bıraktı</text>
  </g>
</svg>
