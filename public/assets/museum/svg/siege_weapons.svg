<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Georgia, serif">
  <title>Kuşatma Silahları / Siege Weapons — Mancınık ve Debbâbe</title>
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <marker id="sa" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="sa-r" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5" fill="#555"/>
    </marker>
  </defs>
  
  <rect width="800" height="550" fill="#FDF8F0"/>
  
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C1810">Kuşatma Silahları — Mancınık ve Debbâbe</text>
  <text x="400" y="48" text-anchor="middle" font-size="13" fill="#666">Siege Weapons — Manjanīq &amp; Dabbāba | أسلحة الحصار</text>
  <text x="400" y="64" text-anchor="middle" font-size="11" fill="#888">DSM-WPN-SG1, DSM-WPN-SG2 | Tâif Kuşatması (630 M)</text>
  
  <!-- ====== MANJANIQ (Catapult/Trebuchet) ====== -->
  <g transform="translate(200,280)">
    <text x="0" y="-185" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C1810">Mancınık (Mancenîk)</text>
    <text x="0" y="-170" text-anchor="middle" font-size="10" fill="#666">Manjanīq / Trebuchet | المنجنيق</text>
    
    <!-- Base frame -->
    <rect x="-80" y="60" width="160" height="12" fill="url(#wood)" stroke="#5D3A1A" stroke-width="1.5" rx="2"/>
    
    <!-- Wheels -->
    <circle cx="-65" cy="80" r="14" fill="none" stroke="#5D3A1A" stroke-width="3"/>
    <circle cx="-65" cy="80" r="2" fill="#5D3A1A"/>
    <line x1="-65" y1="66" x2="-65" y2="94" stroke="#5D3A1A" stroke-width="1"/>
    <line x1="-79" y1="80" x2="-51" y2="80" stroke="#5D3A1A" stroke-width="1"/>
    
    <circle cx="65" cy="80" r="14" fill="none" stroke="#5D3A1A" stroke-width="3"/>
    <circle cx="65" cy="80" r="2" fill="#5D3A1A"/>
    <line x1="65" y1="66" x2="65" y2="94" stroke="#5D3A1A" stroke-width="1"/>
    <line x1="51" y1="80" x2="79" y2="80" stroke="#5D3A1A" stroke-width="1"/>
    
    <!-- A-frame supports -->
    <line x1="-40" y1="60" x2="0" y2="-40" stroke="url(#wood)" stroke-width="6"/>
    <line x1="40" y1="60" x2="0" y2="-40" stroke="url(#wood)" stroke-width="6"/>
    
    <!-- Pivot -->
    <circle cx="0" cy="-40" r="5" fill="#8B6914" stroke="#5D3A1A" stroke-width="2"/>
    
    <!-- Throwing arm (in cocked position) -->
    <line x1="-90" y1="-80" x2="60" y2="20" stroke="#A0522D" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Sling at short end -->
    <path d="M -90 -80 Q -100 -75, -95 -65 Q -88 -55, -80 -65" fill="none" stroke="#8B7355" stroke-width="2"/>
    <circle cx="-95" cy="-65" r="8" fill="#C4A882" stroke="#8B7355" stroke-width="1"/>
    <text x="-115" y="-65" font-size="7" fill="#C0392B">taş mermisi</text>
    
    <!-- Counterweight at long end -->
    <rect x="50" y="20" width="25" height="20" fill="#666" stroke="#444" stroke-width="1.5" rx="2"/>
    <text x="62" y="55" text-anchor="middle" font-size="7" fill="#555">ağırlık</text>
    
    <!-- Trajectory arc -->
    <path d="M -95 -80 Q -60 -160, 30 -150 Q 120 -130, 160 -60" fill="none" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="140" y="-55" font-size="8" fill="#C0392B">→ menzil</text>
    <text x="140" y="-43" font-size="7" fill="#C0392B">~100-300 m</text>
    
    <!-- Dimensions -->
    <line x1="-80" y1="100" x2="80" y2="100" stroke="#555" stroke-width="0.7" marker-start="url(#sa-r)" marker-end="url(#sa)"/>
    <text x="0" y="115" text-anchor="middle" font-size="9" fill="#555">~3-5 m (taban)</text>
    
    <line x1="100" y1="-80" x2="100" y2="80" stroke="#555" stroke-width="0.7" marker-start="url(#sa-r)" marker-end="url(#sa)"/>
    <text x="112" y="5" font-size="8" fill="#555">~4-6 m</text>
    
    <text x="0" y="135" text-anchor="middle" font-size="8" fill="#333">Malzeme: Ahşap çerçeve + ip/kayış</text>
    <text x="0" y="148" text-anchor="middle" font-size="8" fill="#888">Selmân-ı Fârisî'nin İran bilgisi</text>
  </g>
  
  <!-- ====== DABBABA (Battering Ram / Siege Shelter) ====== -->
  <g transform="translate(580,280)">
    <text x="0" y="-155" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C1810">Debbâbe (Koçbaşı Sığınağı)</text>
    <text x="0" y="-140" text-anchor="middle" font-size="10" fill="#666">Dabbāba / Siege Shelter | الدبّابة</text>
    
    <!-- Shelter structure (side view) -->
    <!-- Sloped roof -->
    <path d="M -80 -40 L 0 -80 L 80 -40 L 80 20 L -80 20 Z" fill="url(#wood)" stroke="#5D3A1A" stroke-width="2"/>
    
    <!-- Wet hide covering -->
    <path d="M -80 -40 L 0 -80 L 80 -40" fill="#8B7355" opacity="0.5" stroke="#6B5B3F" stroke-width="1"/>
    <text x="0" y="-50" text-anchor="middle" font-size="7" fill="#FFF">ıslak deri örtü</text>
    <text x="0" y="-40" text-anchor="middle" font-size="6" fill="#DDD">(ateşe karşı)</text>
    
    <!-- Internal structure lines -->
    <line x1="-60" y1="-30" x2="-60" y2="20" stroke="#5D3A1A" stroke-width="2"/>
    <line x1="60" y1="-30" x2="60" y2="20" stroke="#5D3A1A" stroke-width="2"/>
    <line x1="-40" y1="-30" x2="-40" y2="20" stroke="#5D3A1A" stroke-width="1"/>
    <line x1="40" y1="-30" x2="40" y2="20" stroke="#5D3A1A" stroke-width="1"/>
    
    <!-- Ram (koçbaşı) -->
    <rect x="-90" y="0" width="100" height="8" fill="#666" stroke="#444" stroke-width="1.5"/>
    <polygon points="-95,0 -105,4 -95,8" fill="#555" stroke="#333" stroke-width="1"/>
    <text x="-105" y="-5" font-size="7" fill="#C0392B">koçbaşı</text>
    
    <!-- Soldiers inside (silhouettes) -->
    <circle cx="-20" cy="8" r="4" fill="#444" opacity="0.5"/>
    <circle cx="0" cy="8" r="4" fill="#444" opacity="0.5"/>
    <circle cx="20" cy="8" r="4" fill="#444" opacity="0.5"/>
    
    <!-- Wheels -->
    <circle cx="-60" cy="30" r="10" fill="none" stroke="#5D3A1A" stroke-width="2.5"/>
    <circle cx="-60" cy="30" r="2" fill="#5D3A1A"/>
    <circle cx="60" cy="30" r="10" fill="none" stroke="#5D3A1A" stroke-width="2.5"/>
    <circle cx="60" cy="30" r="2" fill="#5D3A1A"/>
    
    <!-- Wall being attacked -->
    <rect x="100" y="-100" width="30" height="160" fill="#9E9E9E" stroke="#666" stroke-width="2"/>
    <text x="115" y="-105" text-anchor="middle" font-size="8" fill="#666">Sur</text>
    
    <!-- Arrow indicating push direction -->
    <line x1="-110" y1="4" x2="-125" y2="4" stroke="#C0392B" stroke-width="1.5" marker-start="url(#sa-r)"/>
    <text x="-130" y="0" text-anchor="end" font-size="7" fill="#C0392B">itme</text>
    <text x="-130" y="10" text-anchor="end" font-size="7" fill="#C0392B">yönü</text>
    
    <!-- Dimensions -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#555" stroke-width="0.7" marker-start="url(#sa-r)" marker-end="url(#sa)"/>
    <text x="0" y="65" text-anchor="middle" font-size="9" fill="#555">~3-4 m</text>
    
    <text x="0" y="85" text-anchor="middle" font-size="8" fill="#333">Ahşap çerçeve + ıslak deri örtü</text>
    <text x="0" y="98" text-anchor="middle" font-size="8" fill="#888">Tâif kuşatmasında kullanıldı (630 M)</text>
    <text x="0" y="111" text-anchor="middle" font-size="8" fill="#888">Tâifliler ateşle yaktı → terk edildi</text>
  </g>
  
  <!-- Context box -->
  <g transform="translate(50,480)">
    <rect x="0" y="0" width="700" height="50" fill="#FFF8E7" stroke="#C4A882" stroke-width="1" rx="5"/>
    <text x="350" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C1810">Tarihî Bağlam / Historical Context</text>
    <text x="15" y="35" font-size="9" fill="#333">Tâif kuşatması (630 M): Hz. Peygamber mancınık ve debbâbe kullandı. Sakîf kabilesi ateşli ok ve kızgın demir savunmasıyla karşılık verdi.</text>
    <text x="15" y="47" font-size="9" fill="#333">18 gün kuşatma sonrası geri çekilindi. Kaynak: Vâkıdî, Meġāzī; İbn Hişâm, es-Sîre. / Source: al-Wāqidī, al-Maghāzī; Ibn Hishām, al-Sīra.</text>
  </g>
</svg>
