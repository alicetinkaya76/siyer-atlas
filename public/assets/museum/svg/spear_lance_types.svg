<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#6B4F12"/>
      <stop offset="100%" stop-color="#5A3E0E"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF6E3"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#3D2B1F">Mızrak ve Harbe Türleri — أنواع الرماح والحراب</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#6B4F12">Types of Spears and Lances in the Prophetic Era</text>

  <!-- 1. Rumh (Long spear) -->
  <g transform="translate(100, 90)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#3D2B1F">1. Rumḥ (رُمْح) — Mızrak</text>
    <text x="0" y="18" font-size="10" fill="#6B4F12">Long battle spear, 3–4 m</text>
    <!-- Shaft -->
    <rect x="20" y="35" width="520" height="8" fill="url(#wood)" rx="4"/>
    <!-- Spearhead -->
    <polygon points="540,39 590,35 590,47 540,43" fill="url(#steel)" stroke="#666" stroke-width="0.5"/>
    <polygon points="590,35 620,39 590,47" fill="#A0A0A0" stroke="#666" stroke-width="0.5"/>
    <!-- Butt spike -->
    <polygon points="20,39 5,37 5,45 20,43" fill="#999" stroke="#666" stroke-width="0.5"/>
    <!-- Annotations -->
    <line x1="540" y1="55" x2="620" y2="55" stroke="#C44D3E" stroke-width="1"/>
    <text x="580" y="68" text-anchor="middle" font-size="9" fill="#C44D3E">سِنان (sinân)</text>
    <line x1="5" y1="55" x2="20" y2="55" stroke="#C44D3E" stroke-width="1"/>
    <text x="12" y="68" text-anchor="middle" font-size="9" fill="#C44D3E">زُجّ (zucc)</text>
    <line x1="100" y1="28" x2="460" y2="28" stroke="#4A7C59" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="280" y="24" text-anchor="middle" font-size="9" fill="#4A7C59">قَناة (qanāh) — gövde / shaft</text>
  </g>

  <!-- 2. Harbah (Short spear / javelin) -->
  <g transform="translate(100, 200)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#3D2B1F">2. Ḥarbah (حَرْبَة) — Harbe / Kısa Mızrak</text>
    <text x="0" y="18" font-size="10" fill="#6B4F12">Short thrusting spear, 1.5–2 m</text>
    <!-- Shaft -->
    <rect x="120" y="35" width="300" height="7" fill="url(#wood)" rx="3"/>
    <!-- Spearhead (wider, leaf-shaped) -->
    <ellipse cx="445" cy="38" rx="30" ry="6" fill="url(#steel)" stroke="#666" stroke-width="0.5"/>
    <polygon points="420,38 475,35 475,42" fill="#B0B0B0" stroke="#666" stroke-width="0.5"/>
    <!-- Note -->
    <text x="450" y="60" text-anchor="middle" font-size="9" fill="#C44D3E">ورقي (leaf-blade)</text>
    <text x="120" y="60" font-size="9" fill="#6B4F12">⟵ Bilâl (r.a.) ve Zübeyr (r.a.) kullanmıştır</text>
  </g>

  <!-- 3. Anazah (Walking staff-spear) -->
  <g transform="translate(100, 300)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#3D2B1F">3. ʿAnazah (عَنَزَة) — Asa-Mızrak</text>
    <text x="0" y="18" font-size="10" fill="#6B4F12">Staff-spear, ~1.5 m — used as prayer marker (sutrah)</text>
    <!-- Shaft -->
    <rect x="160" y="35" width="250" height="6" fill="url(#wood)" rx="3"/>
    <!-- Small iron point -->
    <polygon points="410,38 430,35 430,42" fill="url(#steel)" stroke="#666" stroke-width="0.5"/>
    <!-- Bottom -->
    <circle cx="160" cy="38" r="4" fill="#8B6914" stroke="#666" stroke-width="0.5"/>
    <!-- Annotations -->
    <text x="430" y="55" font-size="9" fill="#C44D3E">← demir uç (iron tip)</text>
    <rect x="160" y="70" width="280" height="26" fill="#FFF8DC" stroke="#D4A574" rx="3"/>
    <text x="170" y="84" font-size="9" fill="#3D2B1F">☪ Hz. Peygamber (s.a.v.) namazda sütre olarak dikerdi</text>
    <text x="170" y="94" font-size="8" fill="#6B4F12">"The Prophet ﷺ used to set it up as a sutrah for prayer"</text>
  </g>

  <!-- Scale comparison -->
  <g transform="translate(100, 420)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#3D2B1F">Ölçek Karşılaştırması</text>
    <!-- Scale bar -->
    <line x1="0" y1="20" x2="520" y2="20" stroke="#3D2B1F" stroke-width="1"/>
    <text x="0" y="40" font-size="9" fill="#6B4F12">0 m</text>
    <text x="130" y="40" font-size="9" fill="#6B4F12">1 m</text>
    <text x="260" y="40" font-size="9" fill="#6B4F12">2 m</text>
    <text x="390" y="40" font-size="9" fill="#6B4F12">3 m</text>
    <text x="520" y="40" font-size="9" fill="#6B4F12">4 m</text>
    <!-- Tick marks -->
    <line x1="0" y1="15" x2="0" y2="25" stroke="#3D2B1F" stroke-width="1"/>
    <line x1="130" y1="15" x2="130" y2="25" stroke="#3D2B1F" stroke-width="1"/>
    <line x1="260" y1="15" x2="260" y2="25" stroke="#3D2B1F" stroke-width="1"/>
    <line x1="390" y1="15" x2="390" y2="25" stroke="#3D2B1F" stroke-width="1"/>
    <line x1="520" y1="15" x2="520" y2="25" stroke="#3D2B1F" stroke-width="1"/>
    <!-- Bars -->
    <rect x="0" y="48" width="520" height="6" fill="#C44D3E" rx="2" opacity="0.7"/>
    <text x="525" y="55" font-size="9" fill="#C44D3E">Rumḥ</text>
    <rect x="0" y="60" width="260" height="6" fill="#4A7C59" rx="2" opacity="0.7"/>
    <text x="265" y="67" font-size="9" fill="#4A7C59">Ḥarbah</text>
    <rect x="0" y="72" width="195" height="6" fill="#2E6B8A" rx="2" opacity="0.7"/>
    <text x="200" y="79" font-size="9" fill="#2E6B8A">ʿAnazah</text>
  </g>

  <!-- Source -->
  <text x="790" y="492" text-anchor="end" font-size="8" fill="#999">Dijital Siyer Müzesi v0.6.1 | Kaynak: İbn Saʿd, Ṭabaqāt; Wāqidī, Maghāzī</text>
</svg>
