<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgIM" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e8d5a3"/><stop offset="30%" stop-color="#d4e6f1"/><stop offset="70%" stop-color="#1a2540"/><stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <marker id="mIM" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#f1c40f"/></marker>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="800" fill="url(#bgIM)"/>

  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1c40f">İsrâ ve Mi'râc / The Night Journey &amp; Ascension</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#d4e6f1">27 Receb — الإسراء والمعراج — Bi'setin 10/11. yılı</text>

  <!-- GROUND LEVEL -->
  <rect x="0" y="680" width="600" height="120" fill="#e8d5a3"/>

  <!-- MEKKE (bottom-left) -->
  <g transform="translate(130,700)">
    <rect x="-35" y="-25" width="70" height="35" rx="4" fill="#2c3e50" stroke="#d4ac0d" stroke-width="1.5"/>
    <text y="-8" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Mescid-i</text>
    <text y="4" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Harâm</text>
    <text y="25" text-anchor="middle" font-size="8" fill="#8b6914">MEKKE</text>
  </g>

  <!-- KUDÜS (bottom-right) -->
  <g transform="translate(470,700)">
    <rect x="-35" y="-25" width="70" height="35" rx="4" fill="#1a5276" stroke="#d4ac0d" stroke-width="1.5"/>
    <text y="-8" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Mescid-i</text>
    <text y="4" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Aksâ</text>
    <text y="25" text-anchor="middle" font-size="8" fill="#2980b9">KUDÜS</text>
  </g>

  <!-- İSRÂ (horizontal, ground level) -->
  <path d="M170,700 Q300,680 430,700" fill="none" stroke="#f1c40f" stroke-width="3" marker-end="url(#mIM)"/>
  <text x="300" y="670" text-anchor="middle" font-size="12" font-weight="bold" fill="#f1c40f">İSRÂ →</text>
  <text x="300" y="684" text-anchor="middle" font-size="8" fill="#d4ac0d">Gece yolculuğu — Burâk ile — ~1,200 km</text>

  <!-- Kur'ân ref -->
  <text x="300" y="755" text-anchor="middle" font-size="8" fill="#8b6914" font-style="italic">"Kulunu bir gece ... götüren Allah'ın şanı yücedir" (İsrâ 17:1)</text>

  <!-- Mİ'RÂC (vertical ascent from Kudüs) -->
  <path d="M470,670 Q460,580 450,500 Q430,400 400,300 Q380,200 350,120 Q330,80 300,60" fill="none" stroke="#f1c40f" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow2)"/>
  <text x="490" y="580" font-size="12" font-weight="bold" fill="#f1c40f">Mİ'RÂC ↑</text>
  <text x="490" y="596" font-size="8" fill="#d4e6f1">Yükseliş</text>

  <!-- SEVEN HEAVENS (yedi kat semâ) -->
  <!-- 1st Heaven -->
  <g transform="translate(420,620)">
    <circle r="16" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">1</text>
  </g>
  <text x="450" y="625" font-size="8" fill="#d5f5e3">① Hz. Âdem</text>

  <!-- 2nd Heaven -->
  <g transform="translate(440,540)">
    <circle r="16" fill="#2980b9" opacity="0.3" stroke="#2980b9" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">2</text>
  </g>
  <text x="470" y="545" font-size="8" fill="#d4e6f1">② Hz. Îsâ + Hz. Yahyâ</text>

  <!-- 3rd Heaven -->
  <g transform="translate(435,470)">
    <circle r="16" fill="#8e44ad" opacity="0.3" stroke="#8e44ad" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">3</text>
  </g>
  <text x="465" y="475" font-size="8" fill="#d7bde2">③ Hz. Yûsuf</text>

  <!-- 4th Heaven -->
  <g transform="translate(420,400)">
    <circle r="16" fill="#f39c12" opacity="0.3" stroke="#f39c12" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">4</text>
  </g>
  <text x="450" y="405" font-size="8" fill="#f9e4b7">④ Hz. İdrîs</text>

  <!-- 5th Heaven -->
  <g transform="translate(400,330)">
    <circle r="16" fill="#c0392b" opacity="0.3" stroke="#c0392b" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">5</text>
  </g>
  <text x="430" y="335" font-size="8" fill="#fadbd8">⑤ Hz. Hârûn</text>

  <!-- 6th Heaven -->
  <g transform="translate(380,260)">
    <circle r="16" fill="#1e8449" opacity="0.3" stroke="#1e8449" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">6</text>
  </g>
  <text x="410" y="265" font-size="8" fill="#a9dfbf">⑥ Hz. Mûsâ</text>

  <!-- 7th Heaven -->
  <g transform="translate(350,190)">
    <circle r="18" fill="#d4ac0d" opacity="0.3" stroke="#f1c40f" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">7</text>
  </g>
  <text x="380" y="195" font-size="8" fill="#f9e4b7">⑦ Hz. İbrâhîm</text>
  <text x="380" y="207" font-size="7" fill="#d4ac0d">(Beytü'l-Ma'mûr)</text>

  <!-- Sidretü'l-Müntehâ -->
  <g transform="translate(330,120)" filter="url(#glow2)">
    <circle r="20" fill="#f1c40f" opacity="0.2" stroke="#f1c40f" stroke-width="1.5"/>
    <text y="-4" text-anchor="middle" font-size="8" fill="#f1c40f" font-weight="bold">Sidretü'l-</text>
    <text y="8" text-anchor="middle" font-size="8" fill="#f1c40f" font-weight="bold">Müntehâ</text>
  </g>
  <text x="330" y="155" text-anchor="middle" font-size="7" fill="#d4ac0d">سِدْرَة المنتهى</text>

  <!-- Divine Presence -->
  <g transform="translate(300,60)" filter="url(#glow2)">
    <circle r="25" fill="#f1c40f" opacity="0.15"/>
    <circle r="15" fill="#f1c40f" opacity="0.2"/>
    <text y="5" text-anchor="middle" font-size="9" fill="#f1c40f" font-weight="bold">İlâhî Huzur</text>
  </g>

  <!-- 5 vakit namaz emri -->
  <g transform="translate(150,120)">
    <rect x="-70" y="-18" width="140" height="55" rx="6" fill="#0a0f1a" opacity="0.6" stroke="#f1c40f" stroke-width="1"/>
    <text y="-2" text-anchor="middle" font-size="9" font-weight="bold" fill="#f1c40f">5 Vakit Namaz Farzı</text>
    <text y="14" text-anchor="middle" font-size="7" fill="#d4e6f1">Başlangıçta 50 → Hz. Mûsâ</text>
    <text y="26" text-anchor="middle" font-size="7" fill="#d4e6f1">tavsiyesiyle 5'e indirildi</text>
    <text y="38" text-anchor="middle" font-size="6" fill="#f9e4b7">"Sevabı 50 vakit gibidir"</text>
  </g>

  <!-- Left side: Events at Kudüs -->
  <g transform="translate(80,600)">
    <rect x="-60" y="-15" width="140" height="55" rx="5" fill="#fff" opacity="0.15" stroke="#d4e6f1"/>
    <text y="2" text-anchor="middle" font-size="8" font-weight="bold" fill="#d4e6f1" x="10">Kudüs'te:</text>
    <text y="16" font-size="7" fill="#d4e6f1" x="10" text-anchor="middle">• Tüm peygamberlere imam oldu</text>
    <text y="30" font-size="7" fill="#d4e6f1" x="10" text-anchor="middle">• 2 rekat namaz kıldırdı</text>
  </g>

  <text x="300" y="790" text-anchor="middle" font-size="7" fill="#7f8c8d">Dijital Siyer Müzesi — v0.7.0 — SVG #30</text>
</svg>
