<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="shieldMetal" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#E8E0D0"/>
      <stop offset="40%" stop-color="#D0C8B8"/>
      <stop offset="100%" stop-color="#A09888"/>
    </radialGradient>
    <radialGradient id="shieldLeather" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#9B6B4A"/>
      <stop offset="40%" stop-color="#7D5538"/>
      <stop offset="100%" stop-color="#5C3D25"/>
    </radialGradient>
    <linearGradient id="ironBoss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="50%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <filter id="sh4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#FAFAF5"/>
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="#D4C5A0" stroke-width="1"/>
  <rect x="25" y="25" width="750" height="450" fill="none" stroke="#D4C5A0" stroke-width="0.5"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2C1810" font-weight="bold">تُرْس وَدَرَقَة</text>
  <text x="400" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C4330">Turs (Iron Shield) &amp; Daraqah (Leather Shield)</text>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" font-style="italic">7th-Century Arabian Shield Types</text>

  <!-- LEFT: Iron/Wood Shield (Turs) - al-Zaluq -->
  <g transform="translate(210, 275)" filter="url(#sh4)">
    <!-- Shield body - round -->
    <circle cx="0" cy="0" r="110" fill="url(#shieldMetal)" stroke="#888" stroke-width="1.5"/>
    
    <!-- Rim reinforcement -->
    <circle cx="0" cy="0" r="108" fill="none" stroke="#A09080" stroke-width="3"/>
    <circle cx="0" cy="0" r="104" fill="none" stroke="#B0A090" stroke-width="0.5"/>
    
    <!-- Central boss (umbo) -->
    <circle cx="0" cy="0" r="22" fill="url(#ironBoss)" stroke="#666" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#999" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#A0A0A0" stroke="#666" stroke-width="0.5"/>
    
    <!-- Rivets around boss -->
    <circle cx="0" cy="-28" r="2" fill="#888"/>
    <circle cx="26" cy="-10" r="2" fill="#888"/>
    <circle cx="16" cy="23" r="2" fill="#888"/>
    <circle cx="-16" cy="23" r="2" fill="#888"/>
    <circle cx="-26" cy="-10" r="2" fill="#888"/>
    
    <!-- Decorative radial lines -->
    <line x1="0" y1="-30" x2="0" y2="-95" stroke="#A09888" stroke-width="0.5"/>
    <line x1="28" y1="-10" x2="85" y2="-35" stroke="#A09888" stroke-width="0.5"/>
    <line x1="17" y1="25" x2="55" y2="80" stroke="#A09888" stroke-width="0.5"/>
    <line x1="-17" y1="25" x2="-55" y2="80" stroke="#A09888" stroke-width="0.5"/>
    <line x1="-28" y1="-10" x2="-85" y2="-35" stroke="#A09888" stroke-width="0.5"/>
  </g>

  <!-- LEFT label -->
  <text x="210" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C4330" font-weight="bold">al-Zaluq (الزَّلُوق)</text>
  <text x="210" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8B7355" font-style="italic">"The Slippery One"</text>

  <!-- RIGHT: Yemeni Leather Shield (Daraqah) -->
  <g transform="translate(580, 275)" filter="url(#sh4)">
    <!-- Shield body - slightly oval/round -->
    <circle cx="0" cy="0" r="100" fill="url(#shieldLeather)" stroke="#3A2510" stroke-width="1.5"/>
    
    <!-- Leather layers visible at edge -->
    <circle cx="0" cy="0" r="97" fill="none" stroke="#6B4A30" stroke-width="2"/>
    <circle cx="0" cy="0" r="93" fill="none" stroke="#7D5538" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Central boss (wooden/leather) -->
    <circle cx="0" cy="0" r="20" fill="#6B4A30" stroke="#4A2E18" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="#7D5538" stroke="#4A2E18" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#5C3D25"/>
    
    <!-- Rawhide stitching pattern -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#5C3D25" stroke-width="0.8" stroke-dasharray="4,3"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#5C3D25" stroke-width="0.8" stroke-dasharray="4,3"/>
    
    <!-- Hide texture lines -->
    <path d="M -60,-30 C -40,-25 -20,-35 0,-30" fill="none" stroke="#5C3D25" stroke-width="0.3" opacity="0.5"/>
    <path d="M 20,40 C 40,35 60,45 80,40" fill="none" stroke="#5C3D25" stroke-width="0.3" opacity="0.5"/>
    <path d="M -30,60 C -10,55 10,65 30,60" fill="none" stroke="#5C3D25" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- RIGHT label -->
  <text x="580" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C4330" font-weight="bold">Daraqah Yamaniyyah (دَرَقَة يَمَنِيَّة)</text>
  <text x="580" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8B7355" font-style="italic">Yemeni Leather Shield</text>

  <!-- Dimension lines -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#8B7355">
    <!-- Left shield diameter -->
    <line x1="100" y1="390" x2="320" y2="390" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="100" y1="385" x2="100" y2="395" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="320" y1="385" x2="320" y2="395" stroke="#B8972D" stroke-width="0.5"/>
    <text x="210" y="405" text-anchor="middle">~60–70 cm (Ø)</text>
    
    <!-- Right shield diameter -->
    <line x1="480" y1="390" x2="680" y2="390" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="480" y1="385" x2="480" y2="395" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="680" y1="385" x2="680" y2="395" stroke="#B8972D" stroke-width="0.5"/>
    <text x="580" y="405" text-anchor="middle">~55–65 cm (Ø)</text>
  </g>

  <!-- Annotations -->
  <g font-family="Georgia, serif" font-size="9" fill="#5C4330">
    <!-- Left shield -->
    <line x1="210" y1="275" x2="210" y2="420" stroke="#8B7355" stroke-width="0.3"/>
    <text x="210" y="432" text-anchor="middle" font-size="8">Iron boss (umbo) + wood/leather body</text>
    
    <!-- Right shield -->
    <line x1="580" y1="275" x2="580" y2="420" stroke="#8B7355" stroke-width="0.3"/>
    <text x="580" y="432" text-anchor="middle" font-size="8">Multi-layer oxhide (ṭabaqāt al-jild)</text>
  </g>

  <!-- Material info -->
  <g font-family="Georgia, serif" font-size="10" fill="#5C4330">
    <text x="50" y="452" font-weight="bold">Left:</text>
    <text x="85" y="452">Wood + iron fittings, leather facing  |  The Prophet's personal shield</text>
    
    <text x="50" y="468" font-weight="bold">Right:</text>
    <text x="90" y="468">Laminated oxhide (3–7 layers)  |  South Arabian craft tradition  |  Lighter, used by cavalry</text>
  </g>

  <text x="750" y="465" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#B8972D">DSM-WPN-004</text>
</svg>