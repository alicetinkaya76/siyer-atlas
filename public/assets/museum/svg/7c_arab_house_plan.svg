<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/><stop offset="100%" stop-color="#ece3d4"/>
    </linearGradient>
    <pattern id="brick" width="20" height="10" patternUnits="userSpaceOnUse">
      <rect width="20" height="10" fill="#d4a76a"/>
      <line x1="0" y1="5" x2="20" y2="5" stroke="#c49a5e" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="10" y2="5" stroke="#c49a5e" stroke-width="0.5"/>
      <line x1="0" y1="5" x2="0" y2="10" stroke="#c49a5e" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="550" fill="url(#bg4)"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">7. Yüzyıl Arap Evi Planı / 7th-Century Arab House Plan</text>
  <text x="300" y="45" text-anchor="middle" font-size="10" fill="#7f8c8d">Tipik Hicâz Konut Tipolojisi — نموذج البيت الحجازي</text>

  <!-- Outer walls -->
  <rect x="80" y="70" width="400" height="380" rx="0" fill="url(#brick)" stroke="#8B6914" stroke-width="3"/>

  <!-- Avlu / Courtyard (center, open) -->
  <rect x="160" y="140" width="240" height="200" fill="#F5E6C8" stroke="#8B6914" stroke-width="1.5"/>
  <text x="280" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B6914">AVLU</text>
  <text x="280" y="252" text-anchor="middle" font-size="10" fill="#a0896a">الفِناء</text>
  <text x="280" y="268" text-anchor="middle" font-size="8" fill="#a0896a">Açık alan — Ev yaşamının merkezi</text>

  <!-- Well in courtyard -->
  <circle cx="230" cy="210" r="12" fill="#d4e6f1" stroke="#2980b9" stroke-width="1.5"/>
  <text x="230" y="214" text-anchor="middle" font-size="7" fill="#2980b9" font-weight="bold">Kuyu</text>

  <!-- Room 1: Oda / Living Room (top-left) -->
  <rect x="80" y="70" width="80" height="70" fill="#E8D5A3" stroke="#8B6914" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#5D4E37">Oturma</text>
  <text x="120" y="112" text-anchor="middle" font-size="7" fill="#8B6914">المجلس</text>
  <text x="120" y="124" text-anchor="middle" font-size="7" fill="#a0896a">Misafir odası</text>

  <!-- Room 2: Yatak odası (top-right) -->
  <rect x="400" y="70" width="80" height="70" fill="#E8D5A3" stroke="#8B6914" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#5D4E37">Yatak</text>
  <text x="440" y="112" text-anchor="middle" font-size="7" fill="#8B6914">المَخْدَع</text>

  <!-- Room 3: Mutfak / Kitchen (bottom-left) -->
  <rect x="80" y="340" width="80" height="110" fill="#E8D5A3" stroke="#8B6914" stroke-width="1.5"/>
  <text x="120" y="385" text-anchor="middle" font-size="9" font-weight="bold" fill="#5D4E37">Mutfak</text>
  <text x="120" y="397" text-anchor="middle" font-size="7" fill="#8B6914">المَطْبَخ</text>
  <!-- Fire pit -->
  <circle cx="120" cy="420" r="8" fill="#e74c3c" opacity="0.3" stroke="#c0392b"/>
  <text x="120" y="424" text-anchor="middle" font-size="6" fill="#c0392b">🔥</text>

  <!-- Room 4: Depo / Storage (bottom-right) -->
  <rect x="400" y="340" width="80" height="110" fill="#E8D5A3" stroke="#8B6914" stroke-width="1.5"/>
  <text x="440" y="385" text-anchor="middle" font-size="9" font-weight="bold" fill="#5D4E37">Depo</text>
  <text x="440" y="397" text-anchor="middle" font-size="7" fill="#8B6914">المَخْزَن</text>
  <text x="440" y="415" text-anchor="middle" font-size="7" fill="#a0896a">Hurma, un</text>

  <!-- Room 5: Hayvan bölmesi (left-middle) -->
  <rect x="80" y="140" width="80" height="100" fill="#D5C4A1" stroke="#8B6914" stroke-width="1.5"/>
  <text x="120" y="180" text-anchor="middle" font-size="8" font-weight="bold" fill="#5D4E37">Hayvan</text>
  <text x="120" y="192" text-anchor="middle" font-size="8" font-weight="bold" fill="#5D4E37">Bölmesi</text>
  <text x="120" y="206" text-anchor="middle" font-size="7" fill="#8B6914">الحظيرة</text>
  <text x="120" y="222" text-anchor="middle" font-size="7" fill="#a0896a">Deve, koyun</text>

  <!-- Room 6: Tuvalet (right-middle, small) -->
  <rect x="400" y="140" width="80" height="50" fill="#D5C4A1" stroke="#8B6914" stroke-width="1.5"/>
  <text x="440" y="165" text-anchor="middle" font-size="8" font-weight="bold" fill="#5D4E37">Halâ</text>
  <text x="440" y="177" text-anchor="middle" font-size="7" fill="#8B6914">الخَلاء</text>

  <!-- Gölgelik / Shade -->
  <rect x="160" y="140" width="240" height="30" fill="#c4a882" opacity="0.4" stroke="#8B6914" stroke-width="0.5"/>
  <text x="280" y="158" text-anchor="middle" font-size="7" fill="#6d5b3e">Hurma dalı gölgelik / ظُلَّة</text>

  <!-- Kapı / Door (south wall) -->
  <rect x="260" y="445" width="40" height="8" fill="#6d5b3e" stroke="#5B2C06" stroke-width="1"/>
  <text x="280" y="468" text-anchor="middle" font-size="9" font-weight="bold" fill="#5B2C06">GİRİŞ KAPISI</text>
  <text x="280" y="480" text-anchor="middle" font-size="7" fill="#8B6914">الباب</text>

  <!-- Dimensions -->
  <line x1="80" y1="465" x2="480" y2="465" stroke="#7f8c8d" stroke-width="0.5"/>
  <text x="280" y="498" text-anchor="middle" font-size="8" fill="#7f8c8d">~12–15 m</text>
  <line x1="495" y1="70" x2="495" y2="450" stroke="#7f8c8d" stroke-width="0.5"/>
  <text x="520" y="260" font-size="8" fill="#7f8c8d" transform="rotate(90,520,260)">~10–13 m</text>

  <!-- Construction notes -->
  <g transform="translate(20,490)">
    <rect x="-10" y="-12" width="280" height="52" rx="4" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="8" font-weight="bold" fill="#2c3e50">Yapı Malzemeleri:</text>
    <text y="14" font-size="7" fill="#5D4E37">Duvar: Kerpiç (libn) veya taş — Çatı: Hurma dalı (cerîd) — Zemin: Toprak</text>
    <text y="28" font-size="7" fill="#5D4E37">Yükseklik: ~2.5–3 m — Duvar kalınlığı: ~40–50 cm</text>
    <text y="42" font-size="7" fill="#7f8c8d">Pencere az, gizlilik esas — Avlu ev yaşamının merkezi</text>
  </g>

  <!-- North -->
  <g transform="translate(540,490)"><text font-size="9" font-weight="bold" fill="#c0392b">N ↑</text></g>
  <text x="300" y="542" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #23</text>
</svg>
