<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <pattern id="mudbrick" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
      <rect width="20" height="10" fill="#D4B896"/>
      <line x1="0" y1="5" x2="20" y2="5" stroke="#C4A880" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="10" y2="5" stroke="#C4A880" stroke-width="0.5"/>
      <line x1="0" y1="5" x2="0" y2="10" stroke="#C4A880" stroke-width="0.5"/>
    </pattern>
    <pattern id="palmTrunk" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#8B6914"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="#7A5C10" stroke-width="0.5"/>
    </pattern>
    <filter id="sh5" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>

  <rect width="800" height="550" fill="#FAFAF5"/>
  <rect x="20" y="20" width="760" height="510" fill="none" stroke="#D4C5A0" stroke-width="1"/>
  <rect x="25" y="25" width="750" height="500" fill="none" stroke="#D4C5A0" stroke-width="0.5"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#2C1810" font-weight="bold">اَلْمَسْجِدُ النَّبَوِيّ — الشَّكْلُ الْأَوَّل</text>
  <text x="400" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C4330">Masjid al-Nabawī — Original Form (622 CE / 1 AH)</text>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" font-style="italic">Reconstructed Plan View (Approx. 30 × 35 m)</text>

  <!-- PLAN VIEW - top-down architectural drawing -->
  <g transform="translate(160, 130)" filter="url(#sh5)">
    <!-- Outer walls (mudbrick) -->
    <rect x="0" y="0" width="300" height="350" fill="#F5EDD8" stroke="#8B7355" stroke-width="2.5"/>
    
    <!-- Wall fill pattern -->
    <rect x="0" y="0" width="300" height="8" fill="url(#mudbrick)"/>
    <rect x="0" y="342" width="300" height="8" fill="url(#mudbrick)"/>
    <rect x="0" y="0" width="8" height="350" fill="url(#mudbrick)"/>
    <rect x="292" y="0" width="8" height="350" fill="url(#mudbrick)"/>

    <!-- QIBLA WALL (South - initially toward Jerusalem, later Mecca) -->
    <rect x="8" y="342" width="284" height="8" fill="#C9A84C" opacity="0.5"/>
    <text x="150" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B6914" font-weight="bold">QIBLA WALL (toward Mecca after 624 CE)</text>

    <!-- Prayer area (covered portico - southern part) -->
    <rect x="12" y="250" width="276" height="90" fill="#E8DCC0" stroke="#B8972D" stroke-width="0.8" stroke-dasharray="4,2"/>
    <text x="150" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8B6914">Covered Prayer Hall (Ẓulla)</text>
    <text x="150" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B7355">Palm trunk columns + palm leaf roof</text>

    <!-- Palm trunk columns in prayer area (3 rows × 6) -->
    <g fill="url(#palmTrunk)" stroke="#5C3D25" stroke-width="0.5">
      <!-- Row 1 -->
      <circle cx="50" cy="270" r="4"/><circle cx="100" cy="270" r="4"/>
      <circle cx="150" cy="270" r="4"/><circle cx="200" cy="270" r="4"/>
      <circle cx="250" cy="270" r="4"/>
      <!-- Row 2 -->
      <circle cx="50" cy="295" r="4"/><circle cx="100" cy="295" r="4"/>
      <circle cx="150" cy="295" r="4"/><circle cx="200" cy="295" r="4"/>
      <circle cx="250" cy="295" r="4"/>
      <!-- Row 3 -->
      <circle cx="50" cy="320" r="4"/><circle cx="100" cy="320" r="4"/>
      <circle cx="150" cy="320" r="4"/><circle cx="200" cy="320" r="4"/>
      <circle cx="250" cy="320" r="4"/>
    </g>

    <!-- Suffah (shaded bench - northern part) -->
    <rect x="12" y="12" width="130" height="55" fill="#D8CEB0" stroke="#A09070" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="77" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8B6914">Ṣuffa</text>
    <text x="77" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8B7355">(Shaded Bench)</text>

    <!-- Open courtyard -->
    <text x="150" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A09070">Open Courtyard</text>
    <text x="150" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#B8A888" font-style="italic">(Ṣaḥn — packed earth)</text>

    <!-- Prophet's chambers (Ḥujurāt) - eastern side -->
    <g stroke="#8B6914" stroke-width="1" fill="#E8D8B8">
      <!-- Aisha's chamber -->
      <rect x="248" y="180" width="44" height="40" rx="1"/>
      <text x="270" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#5C4330">ʿĀʾishah</text>
      <text x="270" y="207" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#8B7355">حجرة عائشة</text>
      
      <!-- Hafsa's chamber -->
      <rect x="248" y="222" width="44" height="28" rx="1"/>
      <text x="270" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#5C4330">Ḥafṣah</text>

      <!-- Sawda's chamber -->
      <rect x="248" y="138" width="44" height="40" rx="1"/>
      <text x="270" y="156" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#5C4330">Sawdah</text>
    </g>

    <!-- Doors/Entrances -->
    <!-- Main entrance (Bab al-Salam - south) -->
    <rect x="130" y="345" width="40" height="5" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>
    <text x="150" y="356" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#8B6914">Bāb</text>
    
    <!-- Eastern entrance -->
    <rect x="295" y="100" width="5" height="30" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>
    
    <!-- Western entrance -->
    <rect x="0" y="100" width="5" height="30" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>

    <!-- North arrow -->
    <g transform="translate(270, 30)">
      <polygon points="0,-15 -5,0 0,-5 5,0" fill="#8B6914"/>
      <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B6914" font-weight="bold">N</text>
    </g>
  </g>

  <!-- Dimension lines -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#8B7355">
    <!-- Width -->
    <line x1="160" y1="500" x2="460" y2="500" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="160" y1="495" x2="160" y2="505" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="460" y1="495" x2="460" y2="505" stroke="#B8972D" stroke-width="0.5"/>
    <text x="310" y="515" text-anchor="middle">~30 m (100 dhirāʿ)</text>
    
    <!-- Height -->
    <line x1="490" y1="130" x2="490" y2="480" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="485" y1="130" x2="495" y2="130" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="485" y1="480" x2="495" y2="480" stroke="#B8972D" stroke-width="0.5"/>
    <text x="505" y="310" transform="rotate(90, 505, 310)" text-anchor="middle">~35 m (depth)</text>
  </g>

  <!-- Right side annotations -->
  <g transform="translate(530, 140)" font-family="Georgia, serif" font-size="10" fill="#5C4330">
    <text x="0" y="0" font-weight="bold" font-size="11">Construction Details</text>
    
    <text x="0" y="25" font-weight="bold" font-size="9">Walls:</text>
    <text x="45" y="25" font-size="9">Sun-dried mudbrick (libn)</text>
    <text x="45" y="37" font-size="8" fill="#8B7355">~3 m high, stone foundation</text>
    
    <text x="0" y="60" font-weight="bold" font-size="9">Columns:</text>
    <text x="60" y="60" font-size="9">Palm trunks (juthūʿ)</text>
    
    <text x="0" y="82" font-weight="bold" font-size="9">Roof:</text>
    <text x="40" y="82" font-size="9">Palm fronds + mud plaster</text>
    
    <text x="0" y="104" font-weight="bold" font-size="9">Floor:</text>
    <text x="42" y="104" font-size="9">Packed earth, later gravel</text>
    
    <text x="0" y="126" font-weight="bold" font-size="9">Qibla:</text>
    <text x="48" y="126" font-size="9">Initially Jerusalem;</text>
    <text x="48" y="138" font-size="9">changed to Mecca (624)</text>
    
    <text x="0" y="165" font-weight="bold" font-size="9">Chambers:</text>
    <text x="68" y="165" font-size="9">~3–4 m² each;</text>
    <text x="68" y="177" font-size="9">palm frond walls</text>

    <!-- Legend -->
    <text x="0" y="210" font-weight="bold" font-size="11">Legend</text>
    <rect x="0" y="220" width="15" height="10" fill="#E8DCC0" stroke="#B8972D" stroke-width="0.5"/>
    <text x="20" y="229" font-size="9">Covered prayer area</text>
    
    <rect x="0" y="240" width="15" height="10" fill="#D8CEB0" stroke="#A09070" stroke-width="0.5"/>
    <text x="20" y="249" font-size="9">Ṣuffa (student quarters)</text>
    
    <rect x="0" y="260" width="15" height="10" fill="#E8D8B8" stroke="#8B6914" stroke-width="0.5"/>
    <text x="20" y="269" font-size="9">Prophet's chambers</text>
    
    <rect x="0" y="280" width="15" height="10" fill="#F5EDD8" stroke="#8B7355" stroke-width="0.5"/>
    <text x="20" y="289" font-size="9">Open courtyard</text>
    
    <circle cx="7" cy="305" r="4" fill="url(#palmTrunk)" stroke="#5C3D25" stroke-width="0.5"/>
    <text x="20" y="309" font-size="9">Palm trunk column</text>
    
    <rect x="0" y="320" width="15" height="5" fill="#C9A84C" stroke="#8B6914" stroke-width="0.5"/>
    <text x="20" y="327" font-size="9">Entrance (bāb)</text>
  </g>

  <!-- Source -->
  <g font-family="Georgia, serif" font-size="9" fill="#5C4330">
    <text x="50" y="525" font-weight="bold">Sources:</text>
    <text x="105" y="525">al-Bukhārī, Ṣalāt 1; Ibn Saʿd, al-Ṭabaqāt; al-Samhūdī, Wafāʾ al-Wafā</text>
  </g>

  <text x="750" y="525" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#B8972D">DSM-ARC-001</text>
</svg>