<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/><stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="500" fill="url(#bgT)"/>
  <text x="500" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Sîret Zaman Çizelgesi / Sira Timeline</text>
  <text x="500" y="44" text-anchor="middle" font-size="10" fill="#7f8c8d">610–632 CE — 23 Yıl Nübüvvet — ٢٣ عاماً من النبوّة</text>

  <!-- Main timeline line -->
  <line x1="50" y1="250" x2="950" y2="250" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>

  <!-- Year markers -->
  <g font-size="7" fill="#a0896a">
    <line x1="50" y1="245" x2="50" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="50" y="270" text-anchor="middle">610</text>

    <line x1="130" y1="245" x2="130" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="130" y="270" text-anchor="middle">613</text>

    <line x1="210" y1="245" x2="210" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="210" y="270" text-anchor="middle">615</text>

    <line x1="290" y1="245" x2="290" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="290" y="270" text-anchor="middle">619</text>

    <line x1="350" y1="245" x2="350" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="350" y="270" text-anchor="middle">621</text>

    <line x1="430" y1="242" x2="430" y2="258" stroke="#c0392b" stroke-width="2.5"/>
    <text x="430" y="275" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">622</text>
    <text x="430" y="286" text-anchor="middle" font-size="7" fill="#c0392b">HİCRET</text>

    <line x1="510" y1="245" x2="510" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="510" y="270" text-anchor="middle">624</text>

    <line x1="570" y1="245" x2="570" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="570" y="270" text-anchor="middle">625</text>

    <line x1="630" y1="245" x2="630" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="630" y="270" text-anchor="middle">627</text>

    <line x1="700" y1="245" x2="700" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="700" y="270" text-anchor="middle">628</text>

    <line x1="790" y1="245" x2="790" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="790" y="270" text-anchor="middle">630</text>

    <line x1="880" y1="245" x2="880" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="880" y="270" text-anchor="middle">631</text>

    <line x1="950" y1="245" x2="950" y2="255" stroke="#8B6914" stroke-width="1.5"/>
    <text x="950" y="270" text-anchor="middle">632</text>
  </g>

  <!-- Mekke period background -->
  <rect x="45" y="230" width="385" height="5" fill="#e74c3c" opacity="0.2" rx="2"/>
  <text x="237" y="225" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="bold">MEKKE DÖNEMİ (13 yıl)</text>

  <!-- Medine period background -->
  <rect x="430" y="230" width="525" height="5" fill="#27ae60" opacity="0.2" rx="2"/>
  <text x="692" y="225" text-anchor="middle" font-size="8" fill="#1e8449" font-weight="bold">MEDİNE DÖNEMİ (10 yıl)</text>

  <!-- EVENTS (alternating above/below) -->

  <!-- 610: İlk Vahiy -->
  <g transform="translate(50,250)">
    <circle r="6" fill="#f39c12" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="-50" stroke="#f39c12" stroke-width="1"/>
    <rect x="-45" y="-85" width="90" height="32" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="0" y="-70" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">İlk Vahiy</text>
    <text x="0" y="-58" text-anchor="middle" font-size="7" fill="#fff">Hira Mağarası</text>
  </g>

  <!-- 613: Açık Davet -->
  <g transform="translate(130,250)">
    <circle r="5" fill="#8e44ad" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="6" x2="0" y2="40" stroke="#8e44ad" stroke-width="1"/>
    <text x="0" y="55" text-anchor="middle" font-size="8" font-weight="bold" fill="#8e44ad">Açık Davet</text>
    <text x="0" y="67" text-anchor="middle" font-size="7" fill="#8e44ad">Safâ Tepesi</text>
  </g>

  <!-- 615: Habeşistan Hicreti -->
  <g transform="translate(210,250)">
    <circle r="5" fill="#2980b9" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="-40" stroke="#2980b9" stroke-width="1"/>
    <text x="0" y="-48" text-anchor="middle" font-size="8" font-weight="bold" fill="#2980b9">Habeşistan</text>
    <text x="0" y="-38" text-anchor="middle" font-size="7" fill="#2980b9">Hicreti</text>
  </g>

  <!-- 619: Hüzün Yılı -->
  <g transform="translate(290,250)">
    <circle r="5" fill="#2c3e50" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="6" x2="0" y2="40" stroke="#2c3e50" stroke-width="1"/>
    <text x="0" y="55" text-anchor="middle" font-size="8" font-weight="bold" fill="#2c3e50">Hüzün Yılı</text>
    <text x="0" y="67" text-anchor="middle" font-size="6" fill="#7f8c8d">Hatice+Ebû Tâlib vefatı</text>
  </g>

  <!-- 621: İsrâ Mi'râc + Akabe -->
  <g transform="translate(350,250)">
    <circle r="5" fill="#f1c40f" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="-50" stroke="#f1c40f" stroke-width="1"/>
    <text x="0" y="-58" text-anchor="middle" font-size="7" font-weight="bold" fill="#d4ac0d">İsrâ-Mi'râc</text>
    <text x="0" y="-46" text-anchor="middle" font-size="7" fill="#d4ac0d">Akabe Bey'atları</text>
  </g>

  <!-- 622: HİCRET (major) -->
  <g transform="translate(430,250)">
    <circle r="8" fill="#c0392b" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#c0392b" stroke-width="1.5"/>
    <rect x="-40" y="-95" width="80" height="32" rx="4" fill="#c0392b" opacity="0.9"/>
    <text x="0" y="-80" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">HİCRET</text>
    <text x="0" y="-68" text-anchor="middle" font-size="7" fill="#fadbd8">Mekke → Medîne</text>
  </g>

  <!-- 624: Bedir -->
  <g transform="translate(510,250)">
    <circle r="6" fill="#27ae60" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="6" x2="0" y2="45" stroke="#27ae60" stroke-width="1"/>
    <text x="0" y="58" text-anchor="middle" font-size="8" font-weight="bold" fill="#27ae60">⚔ Bedir</text>
    <text x="0" y="70" text-anchor="middle" font-size="7" fill="#1e8449">313 vs 950</text>
  </g>

  <!-- 625: Uhud -->
  <g transform="translate(570,250)">
    <circle r="5" fill="#e74c3c" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="-35" stroke="#e74c3c" stroke-width="1"/>
    <text x="0" y="-42" text-anchor="middle" font-size="8" font-weight="bold" fill="#e74c3c">⚔ Uhud</text>
  </g>

  <!-- 627: Hendek -->
  <g transform="translate(630,250)">
    <circle r="5" fill="#6d4c2a" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="6" x2="0" y2="40" stroke="#6d4c2a" stroke-width="1"/>
    <text x="0" y="55" text-anchor="middle" font-size="8" font-weight="bold" fill="#6d4c2a">⚔ Hendek</text>
    <text x="0" y="67" text-anchor="middle" font-size="7" fill="#8b6914">10K kuşatma</text>
  </g>

  <!-- 628: Hudeybiye + Hayber -->
  <g transform="translate(700,250)">
    <circle r="5" fill="#f39c12" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="-45" stroke="#f39c12" stroke-width="1"/>
    <text x="0" y="-53" text-anchor="middle" font-size="7" font-weight="bold" fill="#d4ac0d">Hudeybiye</text>
    <text x="0" y="-42" text-anchor="middle" font-size="7" fill="#d4ac0d">+ Hayber</text>
  </g>

  <!-- 630: Mekke Fethi -->
  <g transform="translate(790,250)">
    <circle r="7" fill="#27ae60" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="7" x2="0" y2="50" stroke="#27ae60" stroke-width="1.5"/>
    <rect x="-45" y="52" width="90" height="32" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="0" y="67" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">Mekke Fethi</text>
    <text x="0" y="79" text-anchor="middle" font-size="7" fill="#d5f5e3">10,000 asker</text>
  </g>

  <!-- 631: Tebük + Heyetler -->
  <g transform="translate(880,250)">
    <circle r="5" fill="#1a5276" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="-35" stroke="#1a5276" stroke-width="1"/>
    <text x="0" y="-42" text-anchor="middle" font-size="7" font-weight="bold" fill="#1a5276">Tebük Seferi</text>
    <text x="0" y="-32" text-anchor="middle" font-size="6" fill="#2980b9">Heyetler Yılı</text>
  </g>

  <!-- 632: Vedâ + Vefat -->
  <g transform="translate(950,250)">
    <circle r="6" fill="#2c3e50" stroke="#d4ac0d" stroke-width="2"/>
    <line x1="0" y1="6" x2="0" y2="45" stroke="#2c3e50" stroke-width="1.5"/>
    <rect x="-45" y="48" width="90" height="38" rx="4" fill="#2c3e50" opacity="0.9"/>
    <text x="0" y="63" text-anchor="middle" font-size="8" font-weight="bold" fill="#d4ac0d">Vedâ Haccı</text>
    <text x="0" y="75" text-anchor="middle" font-size="7" fill="#fff">Vefat: 12 R.evvel</text>
    <text x="0" y="85" text-anchor="middle" font-size="6" fill="#d4e6f1">8 Haziran 632</text>
  </g>

  <!-- Stats bottom bar -->
  <g transform="translate(500,440)">
    <text text-anchor="middle" font-size="8" fill="#7f8c8d">23 yıl nübüvvet • 27+ gazve • Mekke: 13 yıl (gizli+açık davet) • Medîne: 10 yıl (devlet+savaşlar+fetih)</text>
  </g>

  <!-- Period labels -->
  <rect x="45" y="298" width="160" height="22" rx="4" fill="#8e44ad" opacity="0.1" stroke="#8e44ad" stroke-width="0.5"/>
  <text x="125" y="312" text-anchor="middle" font-size="7" fill="#8e44ad">Gizli Davet (3 yıl)</text>

  <rect x="120" y="320" width="310" height="22" rx="4" fill="#c0392b" opacity="0.1" stroke="#c0392b" stroke-width="0.5"/>
  <text x="275" y="334" text-anchor="middle" font-size="7" fill="#c0392b">Açık Davet + İşkence + Boykot (10 yıl)</text>

  <rect x="430" y="298" width="200" height="22" rx="4" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="0.5"/>
  <text x="530" y="312" text-anchor="middle" font-size="7" fill="#1e8449">Savaşlar Dönemi (624–628)</text>

  <rect x="680" y="320" width="275" height="22" rx="4" fill="#1e8449" opacity="0.1" stroke="#1e8449" stroke-width="0.5"/>
  <text x="817" y="334" text-anchor="middle" font-size="7" fill="#1e8449">Fetih + Yayılma + Veda (628–632)</text>

  <text x="500" y="472" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #31</text>
</svg>
