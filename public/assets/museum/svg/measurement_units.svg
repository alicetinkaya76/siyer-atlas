<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF6E3"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="30%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#8B7355"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#3D2B1F">Ölçü ve Tartı Birimleri — المكاييل والموازين</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#6B4F12">Measurement Units in the Prophetic Era</text>

  <!-- VOLUME MEASURES (left side) -->
  <text x="200" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E6B8A">Hacim / الكيل</text>

  <!-- Mudd -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="130" height="110" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">مُدّ — Müdd</text>
    <!-- Bowl shape -->
    <path d="M30,55 Q35,40 65,38 Q95,40 100,55 L95,80 Q80,88 65,90 Q50,88 35,80 Z" fill="url(#clay)" stroke="#8B7355" stroke-width="1"/>
    <text x="65" y="72" text-anchor="middle" font-size="9" fill="#FFF">~0.688 L</text>
    <text x="65" y="105" text-anchor="middle" font-size="9" fill="#6B4F12">iki avuç dolusu</text>
  </g>

  <!-- Sa' -->
  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="130" height="110" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">صاع — Sâ'</text>
    <!-- Larger bowl -->
    <path d="M25,50 Q30,32 65,30 Q100,32 105,50 L100,82 Q82,92 65,94 Q48,92 30,82 Z" fill="url(#clay)" stroke="#8B7355" stroke-width="1"/>
    <text x="65" y="68" text-anchor="middle" font-size="9" fill="#FFF">~2.75 L</text>
    <text x="65" y="105" text-anchor="middle" font-size="9" fill="#6B4F12">= 4 müdd</text>
  </g>

  <!-- Wasq -->
  <g transform="translate(50, 225)">
    <rect x="0" y="0" width="280" height="90" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">وَسْق — Vesk</text>
    <!-- Large sack shape -->
    <path d="M40,35 Q38,28 55,26 L85,26 Q102,28 100,35 L105,72 Q70,80 40,72 Z" fill="#8B6914" stroke="#5A3E0E" stroke-width="1" opacity="0.8"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#FFF">~165 L</text>
    <text x="200" y="45" font-size="10" fill="#3D2B1F">= 60 sâ'</text>
    <text x="200" y="60" font-size="10" fill="#3D2B1F">= 240 müdd</text>
    <text x="200" y="78" font-size="9" fill="#6B4F12">bir deve yükü</text>
  </g>

  <!-- Conversion arrows -->
  <g transform="translate(50, 100)">
    <line x1="130" y1="55" x2="200" y2="55" stroke="#C44D3E" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="165" y="50" text-anchor="middle" font-size="10" fill="#C44D3E" font-weight="bold">×4</text>
  </g>

  <!-- WEIGHT MEASURES (right side) -->
  <text x="600" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#C44D3E">Ağırlık / الوزن</text>

  <!-- Dirham -->
  <g transform="translate(440, 100)">
    <rect x="0" y="0" width="130" height="110" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">دِرْهم — Dirhem</text>
    <circle cx="65" cy="58" r="20" fill="url(#copper)" stroke="#8B5A2B" stroke-width="1"/>
    <text x="65" y="62" text-anchor="middle" font-size="9" fill="#FFF" font-weight="bold">~2.975 g</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#6B4F12">gümüş sikke ağırlığı</text>
  </g>

  <!-- Uqiyya -->
  <g transform="translate(590, 100)">
    <rect x="0" y="0" width="130" height="110" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">أُوقيّة — Ukkiyye</text>
    <circle cx="65" cy="58" r="25" fill="url(#copper)" stroke="#8B5A2B" stroke-width="1"/>
    <text x="65" y="62" text-anchor="middle" font-size="9" fill="#FFF" font-weight="bold">~119 g</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#6B4F12">= 40 dirhem</text>
  </g>

  <!-- Ritl -->
  <g transform="translate(440, 225)">
    <rect x="0" y="0" width="130" height="90" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">رِطْل — Rıtl</text>
    <circle cx="65" cy="52" r="28" fill="url(#copper)" stroke="#8B5A2B" stroke-width="1"/>
    <text x="65" y="56" text-anchor="middle" font-size="9" fill="#FFF" font-weight="bold">~406 g</text>
    <text x="65" y="82" text-anchor="middle" font-size="9" fill="#6B4F12">= 12 ukkiyye (Bağdat)</text>
  </g>

  <!-- Menn -->
  <g transform="translate(590, 225)">
    <rect x="0" y="0" width="130" height="90" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
    <text x="65" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D2B1F">مَنّ — Menn</text>
    <circle cx="65" cy="52" r="30" fill="url(#copper)" stroke="#8B5A2B" stroke-width="1"/>
    <text x="65" y="56" text-anchor="middle" font-size="9" fill="#FFF" font-weight="bold">~812 g</text>
    <text x="65" y="82" text-anchor="middle" font-size="9" fill="#6B4F12">= 2 rıtl</text>
  </g>

  <!-- Weight conversion chain -->
  <g transform="translate(440, 100)">
    <line x1="130" y1="55" x2="190" y2="55" stroke="#C44D3E" stroke-width="1.5"/>
    <text x="160" y="50" text-anchor="middle" font-size="10" fill="#C44D3E" font-weight="bold">×40</text>
  </g>

  <!-- Quranic reference box -->
  <rect x="50" y="340" width="700" height="65" fill="#FFF8DC" stroke="#D4A574" rx="5"/>
  <text x="400" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#C44D3E">Kur'ân-ı Kerîm'de Ölçü Ahlâkı</text>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#3D2B1F">وَأَوْفُوا الْكَيْلَ وَالْمِيزَانَ بِالْقِسْطِ (el-En'âm 6:152)</text>
  <text x="400" y="395" text-anchor="middle" font-size="10" fill="#6B4F12">"Ölçüyü ve tartıyı adaletle yapın" — "Give full measure and weight with justice"</text>

  <!-- Zekat nisab note -->
  <rect x="50" y="420" width="700" height="60" fill="#E8F0E8" stroke="#4A7C59" rx="5"/>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A7C59">Zekât Nisabı Bağlamı</text>
  <text x="400" y="458" text-anchor="middle" font-size="10" fill="#3D2B1F">Gümüş nisabı: 200 dirhem (~595 g) | Altın nisabı: 20 miskâl (~85 g)</text>
  <text x="400" y="472" text-anchor="middle" font-size="10" fill="#3D2B1F">Tahıl/hurma nisabı: 5 vesk (~825 L) — "Beş veskten az üründe zekât yoktur" (Buhârî)</text>

  <text x="790" y="495" text-anchor="end" font-size="8" fill="#999">Dijital Siyer Müzesi v0.6.1 | Kaynak: el-Mâverdî, el-Ahkâmü's-Sultâniyye; Hinz, Islamische Masse</text>
</svg>
