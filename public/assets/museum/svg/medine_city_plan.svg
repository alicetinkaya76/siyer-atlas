<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d2"/><stop offset="100%" stop-color="#ddd0b4"/>
    </linearGradient>
  </defs>
  <rect width="700" height="700" fill="url(#bg5)"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Hz. Peygamber Dönemi Medîne / Prophetic-Era Medina</text>
  <text x="350" y="45" text-anchor="middle" font-size="10" fill="#7f8c8d">622–632 CE — المدينة المنوّرة في العهد النبوي</text>

  <!-- Harre-i Vâkım (East lava field) -->
  <path d="M600,120 Q620,250 610,400 Q620,530 600,620" fill="none" stroke="#4a4a4a" stroke-width="25" opacity="0.15" stroke-linecap="round"/>
  <text x="630" y="370" font-size="8" fill="#4a4a4a" font-weight="bold" transform="rotate(90,630,370)">Harre-i Vâkım (Doğu Lav)</text>

  <!-- Harre-i Vebere (West lava field) -->
  <path d="M100,120 Q80,250 90,400 Q80,530 100,620" fill="none" stroke="#4a4a4a" stroke-width="25" opacity="0.15" stroke-linecap="round"/>
  <text x="62" y="370" font-size="8" fill="#4a4a4a" font-weight="bold" transform="rotate(-90,62,370)">Harre-i Vebere (Batı Lav)</text>

  <!-- Palm groves (scattered green) -->
  <g fill="#2ecc71" opacity="0.2">
    <circle cx="200" cy="500" r="25"/><circle cx="250" cy="530" r="20"/><circle cx="450" cy="510" r="22"/>
    <circle cx="500" cy="480" r="18"/><circle cx="180" cy="420" r="15"/><circle cx="520" cy="400" r="18"/>
    <circle cx="300" cy="560" r="25"/><circle cx="400" cy="550" r="20"/>
  </g>
  <text x="350" y="590" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">Hurma Bahçeleri / نخيل المدينة</text>

  <!-- MESCID-İ NEBEVİ (center) -->
  <g transform="translate(350,300)">
    <rect x="-40" y="-30" width="80" height="60" rx="3" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
    <text y="-10" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">MESCİD-İ</text>
    <text y="3" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">NEBEVÎ</text>
    <text y="16" text-anchor="middle" font-size="7" fill="#d5f5e3">المسجد النبوي</text>
    <!-- Hücreler (east side) -->
    <rect x="40" y="-20" width="15" height="40" rx="2" fill="#2ecc71" stroke="#1e8449" stroke-width="1"/>
    <text x="47" y="28" text-anchor="middle" font-size="6" fill="#1e8449">Hücreler</text>
    <!-- Suffe (north) -->
    <rect x="-35" y="-35" width="70" height="8" rx="2" fill="#f39c12" opacity="0.7"/>
    <text y="-40" text-anchor="middle" font-size="6" fill="#d4ac0d">Suffe</text>
  </g>

  <!-- Kubâ Mescidi (south) -->
  <g transform="translate(350,520)">
    <rect x="-25" y="-12" width="50" height="24" rx="3" fill="#1e8449" stroke="#145a32" stroke-width="1.5"/>
    <text y="2" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">Kubâ</text>
    <text y="12" text-anchor="middle" font-size="6" fill="#d5f5e3">قُباء</text>
  </g>

  <!-- Bakîʿ Cemetery -->
  <g transform="translate(440,310)">
    <rect x="-25" y="-12" width="50" height="24" rx="3" fill="#7f8c8d" opacity="0.6" stroke="#5d6d7e"/>
    <text y="2" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">Bakîʿ</text>
    <text y="24" text-anchor="middle" font-size="6" fill="#7f8c8d">Mezarlık</text>
  </g>

  <!-- Sûku'l-Menâha (Market) -->
  <g transform="translate(270,360)">
    <rect x="-30" y="-10" width="60" height="20" rx="3" fill="#d4ac0d" opacity="0.7" stroke="#8b6914"/>
    <text y="4" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">Çarşı</text>
    <text y="22" text-anchor="middle" font-size="6" fill="#8b6914">Sûku'l-Menâha</text>
  </g>

  <!-- KABILE MAHALLELERİ -->
  <!-- Benî Neccar (around mosque) -->
  <ellipse cx="350" cy="280" rx="90" ry="70" fill="none" stroke="#1a5276" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="280" y="230" font-size="8" fill="#1a5276" font-weight="bold">Benî Neccâr</text>

  <!-- Benî Avf (south) -->
  <ellipse cx="350" cy="470" rx="70" ry="40" fill="none" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="290" y="460" font-size="8" fill="#8e44ad" font-weight="bold">Benî Avf</text>

  <!-- Benî Sâide (west) -->
  <ellipse cx="210" cy="320" rx="50" ry="40" fill="none" stroke="#d35400" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="210" y="310" text-anchor="middle" font-size="8" fill="#d35400" font-weight="bold">Benî Sâide</text>
  <text x="210" y="322" text-anchor="middle" font-size="6" fill="#d35400">Sakîfe burada</text>

  <!-- Benî Kurayza (SE) -->
  <ellipse cx="500" cy="440" rx="50" ry="35" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="500" y="435" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="bold">Benî Kurayza</text>

  <!-- Benî Kaynukâ (central-east) -->
  <ellipse cx="480" cy="280" rx="40" ry="30" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="480" y="278" text-anchor="middle" font-size="7" fill="#c0392b">B. Kaynukâ</text>

  <!-- Benî Nadîr (south of mosque) -->
  <ellipse cx="430" cy="380" rx="45" ry="25" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="430" y="378" text-anchor="middle" font-size="7" fill="#c0392b">B. Nadîr</text>

  <!-- HENDEK hattı (north) -->
  <path d="M130,130 Q250,95 350,110 Q450,95 570,130" fill="none" stroke="#6d4c2a" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
  <text x="350" y="85" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d4c2a">HENDEK HATTI (627 CE)</text>

  <!-- Uhud Dağı (far north) -->
  <path d="M200,60 Q300,35 400,55 Q500,30 560,55 L560,70 Q500,55 400,68 Q300,55 200,70Z" fill="#a0896a" stroke="#6d5b3e" stroke-width="1"/>
  <text x="380" y="62" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">Uhud Dağı</text>

  <!-- Sel Dağı (south) -->
  <path d="M250,640 Q300,625 350,635 Q400,625 450,640 L450,650 Q400,640 350,648 Q300,640 250,650Z" fill="#a0896a" opacity="0.5" stroke="#6d5b3e" stroke-width="0.5"/>
  <text x="350" y="648" text-anchor="middle" font-size="7" fill="#6d5b3e">Sel' / Selʿ Dağı</text>

  <!-- Key Houses -->
  <g font-size="6" fill="#2c3e50">
    <circle cx="320" cy="275" r="3" fill="#27ae60"/><text x="306" y="268">Ebû Eyyûb evi</text>
    <circle cx="300" cy="310" r="3" fill="#f39c12"/><text x="260" y="308">Ebû Bekir</text>
    <circle cx="380" cy="260" r="3" fill="#8e44ad"/><text x="395" y="258">Ömer b. Hattâb</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20,620)">
    <rect x="-10" y="-12" width="250" height="62" rx="4" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <circle cx="5" cy="2" r="4" fill="#27ae60"/><text x="15" y="5" font-size="7" fill="#2c3e50">Mescid/Müslüman mekânı</text>
    <circle cx="5" cy="18" r="4" fill="none" stroke="#c0392b"/><text x="15" y="21" font-size="7" fill="#2c3e50">Yahudi kabile mahallesi</text>
    <rect x="1" y="29" width="8" height="8" fill="#4a4a4a" opacity="0.3"/><text x="15" y="37" font-size="7" fill="#2c3e50">Harre (lav) doğal engel</text>
    <circle cx="5" cy="47" r="4" fill="#2ecc71" opacity="0.3"/><text x="15" y="50" font-size="7" fill="#2c3e50">Hurma bahçeleri</text>
  </g>

  <g transform="translate(660,65)"><text font-size="10" font-weight="bold" fill="#c0392b">N ↑</text></g>
  <text x="350" y="693" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #24</text>
</svg>
