<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <title>Kur'ân Yazım Malzemeleri / Quran Recording Materials</title>
  <defs>
    <marker id="wa" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
  </defs>
  
  <rect width="800" height="500" fill="#FDF8F0"/>
  
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C1810">Kur'ân Yazım Malzemeleri</text>
  <text x="400" y="48" text-anchor="middle" font-size="13" fill="#666">Quran Recording Materials — مواد تدوين القرآن</text>
  <text x="400" y="63" text-anchor="middle" font-size="10" fill="#888">DSM-DL-WRT | Vahiy Kâtiplerinin Araçları / Scribes' Tools</text>
  
  <!-- 1. KALEM (Reed Pen) -->
  <g transform="translate(120,170)">
    <text x="0" y="-40" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Kalem (Kalem-i Hıtt)</text>
    <text x="0" y="-25" text-anchor="middle" font-size="10" fill="#666">Reed Pen | القلم</text>
    
    <!-- Reed pen body -->
    <rect x="-90" y="-5" width="180" height="8" fill="#C4A882" stroke="#8B7355" stroke-width="1" rx="3"/>
    <!-- Cut tip (nibbed) -->
    <polygon points="90,-3 105,0 90,3" fill="#8B7355" stroke="#6B5B3F" stroke-width="0.8"/>
    <!-- Split nib detail -->
    <line x1="90" y1="0" x2="103" y2="0" stroke="#6B5B3F" stroke-width="0.5"/>
    
    <!-- Ink on tip -->
    <circle cx="103" cy="0" r="2" fill="#1a1a1a" opacity="0.7"/>
    
    <!-- Cross-section detail -->
    <circle cx="-60" cy="35" r="8" fill="#C4A882" stroke="#8B7355" stroke-width="1"/>
    <circle cx="-60" cy="35" r="4" fill="#E8DCC8"/>
    <text x="-60" y="55" text-anchor="middle" font-size="7" fill="#555">kesit / section</text>
    
    <text x="0" y="30" text-anchor="middle" font-size="9" fill="#555">~15-25 cm | kamış</text>
    
    <rect x="-75" y="45" width="150" height="30" fill="#FFF8E7" stroke="#C4A882" stroke-width="0.5" rx="3"/>
    <text x="0" y="60" text-anchor="middle" font-size="8" fill="#C0392B" font-style="italic">الَّذِي عَلَّمَ بِالْقَلَمِ</text>
    <text x="0" y="72" text-anchor="middle" font-size="7" fill="#666">"Kalemle öğreten" (Alak 4)</text>
  </g>
  
  <!-- 2. MÜREKKEP (Ink) -->
  <g transform="translate(370,170)">
    <text x="0" y="-40" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Mürekkep (Hibr)</text>
    <text x="0" y="-25" text-anchor="middle" font-size="10" fill="#666">Ink | الحبر / المداد</text>
    
    <!-- Ink pot -->
    <ellipse cx="0" cy="20" rx="25" ry="8" fill="#333" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M -25 20 Q -28 0, -22 -10 Q -12 -18, 0 -18 Q 12 -18, 22 -10 Q 28 0, 25 20" fill="#444" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="0" cy="-18" rx="22" ry="7" fill="#333" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Ink surface -->
    <ellipse cx="0" cy="-18" rx="18" ry="5" fill="#1a1a1a"/>
    
    <!-- Ingredients -->
    <text x="0" y="42" text-anchor="middle" font-size="8" fill="#333">İs (siyah karbon)</text>
    <text x="0" y="53" text-anchor="middle" font-size="8" fill="#333">+ Zamk (arap zamkı)</text>
    <text x="0" y="64" text-anchor="middle" font-size="8" fill="#333">+ Su</text>
    
    <text x="0" y="80" text-anchor="middle" font-size="8" fill="#888">Vahiy kâtipleri kullandı</text>
  </g>
  
  <!-- 3. PARSOMEN (Parchment/Leather) -->
  <g transform="translate(610,155)">
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Parşömen (Rakk)</text>
    <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#666">Parchment | الرَّقّ</text>
    
    <!-- Rolled parchment -->
    <rect x="-60" y="0" width="120" height="80" fill="#F5ECD7" stroke="#C4A882" stroke-width="1.5" rx="2"/>
    <!-- Simulated text lines -->
    <line x1="-45" y1="15" x2="45" y2="15" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    <line x1="-45" y1="25" x2="40" y2="25" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    <line x1="-45" y1="35" x2="48" y2="35" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    <line x1="-45" y1="45" x2="35" y2="45" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    <line x1="-45" y1="55" x2="42" y2="55" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    <line x1="-45" y1="65" x2="30" y2="65" stroke="#8B7355" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Arabic script simulation -->
    <text x="0" y="30" text-anchor="middle" font-size="11" fill="#2C1810" opacity="0.6">بسم الله الرحمن</text>
    
    <!-- Roll edge -->
    <ellipse cx="60" cy="40" rx="5" ry="40" fill="#E8DCC8" stroke="#C4A882" stroke-width="1"/>
    
    <rect x="-55" y="90" width="110" height="25" fill="#FFF8E7" stroke="#C4A882" stroke-width="0.5" rx="3"/>
    <text x="0" y="103" text-anchor="middle" font-size="8" fill="#C0392B" font-style="italic">فِي رَقٍّ مَّنشُورٍ</text>
    <text x="0" y="113" text-anchor="middle" font-size="7" fill="#666">"Yayılmış ince deri" (Tûr 2-3)</text>
  </g>
  
  <!-- 4. LEVHA (Flat writing surface) -->
  <g transform="translate(120,390)">
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Levha (Kevtf / ʿAsb)</text>
    <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#666">Writing Board | اللوح</text>
    
    <!-- Shoulder bone shape -->
    <path d="M -50 0 Q -55 -10, -40 -15 Q -20 -20, 0 -15 Q 20 -20, 40 -15 Q 55 -10, 50 0 L 45 50 Q 30 60, 0 60 Q -30 60, -45 50 Z" fill="#E8DCC8" stroke="#8B7355" stroke-width="1.5"/>
    <!-- Text lines -->
    <text x="0" y="15" text-anchor="middle" font-size="9" fill="#2C1810" opacity="0.5">آيات قرآنية</text>
    
    <text x="0" y="80" text-anchor="middle" font-size="8" fill="#333">Hurma kerestesi / kürek kemiği</text>
    <text x="0" y="92" text-anchor="middle" font-size="8" fill="#888">~20-40 × 15-25 cm</text>
  </g>
  
  <!-- 5. MÜHÜR (Seal Ring) — small -->
  <g transform="translate(370,395)">
    <text x="0" y="-35" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Mühür (Hâtem)</text>
    <text x="0" y="-20" text-anchor="middle" font-size="10" fill="#666">Seal Ring | خاتم النبي ﷺ</text>
    
    <!-- Ring -->
    <ellipse cx="0" cy="15" rx="22" ry="30" fill="none" stroke="#C0C0C0" stroke-width="4"/>
    <!-- Seal stone -->
    <ellipse cx="0" cy="-15" rx="14" ry="10" fill="#8B0000" stroke="#6B0000" stroke-width="1.5"/>
    <!-- Inscription (reversed) -->
    <text x="0" y="-19" text-anchor="middle" font-size="6" fill="#FFD700">محمد</text>
    <text x="0" y="-12" text-anchor="middle" font-size="6" fill="#FFD700">رسول</text>
    <text x="0" y="-5" text-anchor="middle" font-size="6" fill="#FFD700">الله</text>
    
    <text x="0" y="60" text-anchor="middle" font-size="8" fill="#555">Gümüş + akik taş | ~15-20 mm</text>
    <text x="0" y="72" text-anchor="middle" font-size="8" fill="#888">Ters kazıma — baskıda doğru okunur</text>
  </g>
  
  <!-- Context box -->
  <g transform="translate(490,350)">
    <rect x="0" y="0" width="270" height="120" fill="#FFF8E7" stroke="#C4A882" stroke-width="1" rx="5"/>
    <text x="135" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C1810">Vahiy Kâtipleri / Scribes</text>
    <text x="10" y="36" font-size="9" fill="#333">• Zeyd b. Sâbit (baş kâtip)</text>
    <text x="10" y="50" font-size="9" fill="#333">• Ubeyy b. Ka'b</text>
    <text x="10" y="64" font-size="9" fill="#333">• Abdullah b. Mes'ûd</text>
    <text x="10" y="78" font-size="9" fill="#333">• Hz. Ali b. Ebî Tâlib</text>
    <text x="10" y="92" font-size="9" fill="#333">• Hz. Osman b. Affân</text>
    <text x="10" y="108" font-size="8" fill="#888">~40+ vahiy kâtibi kayda geçmiştir</text>
  </g>
  
  <line x1="50" y1="475" x2="750" y2="475" stroke="#C4A882" stroke-width="0.5"/>
  <text x="400" y="492" text-anchor="middle" font-size="9" fill="#888">Dijital Siyer Müzesi — Yazı Araçları Koleksiyonu | Digital Sira Museum — Writing Tools Collection</text>
</svg>
