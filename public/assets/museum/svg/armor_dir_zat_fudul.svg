<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <pattern id="chainmail" x="0" y="0" width="12" height="10" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="3" fill="none" stroke="#A0A0A0" stroke-width="0.6"/>
      <circle cx="9" cy="3" r="3" fill="none" stroke="#A0A0A0" stroke-width="0.6"/>
      <circle cx="6" cy="8" r="3" fill="none" stroke="#B0B0B0" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="mailBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8C8C8"/>
      <stop offset="50%" stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#FAFAF5"/>
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="#D4C5A0" stroke-width="1"/>
  <rect x="25" y="25" width="750" height="450" fill="none" stroke="#D4C5A0" stroke-width="0.5"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2C1810" font-weight="bold">دِرْع  —  ذَاتُ الْفُضُول</text>
  <text x="400" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C4330">Dhāt al-Fuḍūl  |  Zât el-Füdûl</text>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" font-style="italic">The Prophet's Primary Coat of Mail</text>

  <!-- Chain Mail Body - front view silhouette -->
  <g transform="translate(300, 115)" filter="url(#shadow3)">
    <!-- Main body shape -->
    <path d="M 0,0 
             C -20,0 -60,10 -70,30
             L -75,50 L -110,55 L -120,100 L -105,105
             L -85,100 L -80,200 L -60,280 L 0,290
             L 60,280 L 80,200 L 85,100
             L 105,105 L 120,100 L 110,55 L 75,50
             L 70,30 C 60,10 20,0 0,0 Z"
          fill="url(#mailBody)" stroke="#888" stroke-width="1"/>
    
    <!-- Chain mail pattern overlay -->
    <path d="M 0,0 
             C -20,0 -60,10 -70,30
             L -75,50 L -110,55 L -120,100 L -105,105
             L -85,100 L -80,200 L -60,280 L 0,290
             L 60,280 L 80,200 L 85,100
             L 105,105 L 120,100 L 110,55 L 75,50
             L 70,30 C 60,10 20,0 0,0 Z"
          fill="url(#chainmail)" opacity="0.6"/>
    
    <!-- Neck opening -->
    <ellipse cx="0" cy="5" rx="30" ry="12" fill="#FAFAF5" stroke="#888" stroke-width="0.8"/>
    
    <!-- Center line (front seam) -->
    <line x1="0" y1="15" x2="0" y2="285" stroke="#999" stroke-width="0.5" stroke-dasharray="4,3"/>
    
    <!-- Sleeve edges -->
    <path d="M -110,55 L -120,100 L -105,105" fill="none" stroke="#777" stroke-width="1.2"/>
    <path d="M 110,55 L 120,100 L 105,105" fill="none" stroke="#777" stroke-width="1.2"/>
    
    <!-- Hem reinforcement -->
    <path d="M -60,278 C -30,290 30,290 60,278" fill="none" stroke="#999" stroke-width="1.5"/>
  </g>

  <!-- Ring detail inset -->
  <g transform="translate(600, 130)">
    <rect x="-5" y="-5" width="130" height="100" rx="3" fill="#F5F0E8" stroke="#D4C5A0" stroke-width="1"/>
    <text x="60" y="12" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C4330" font-weight="bold">Ring Detail (×4)</text>
    
    <!-- Enlarged chain rings -->
    <circle cx="30" cy="45" r="15" fill="none" stroke="#888" stroke-width="2"/>
    <circle cx="55" cy="45" r="15" fill="none" stroke="#999" stroke-width="2"/>
    <circle cx="42" cy="65" r="15" fill="none" stroke="#888" stroke-width="2"/>
    <circle cx="80" cy="45" r="15" fill="none" stroke="#999" stroke-width="2"/>
    <circle cx="67" cy="65" r="15" fill="none" stroke="#888" stroke-width="2"/>
    
    <!-- Rivet detail -->
    <circle cx="30" cy="30" r="1.5" fill="#666"/>
    <circle cx="55" cy="30" r="1.5" fill="#666"/>
    <text x="60" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B7355" font-style="italic">Riveted iron rings (4-in-1)</text>
  </g>

  <!-- Annotations -->
  <g font-family="Georgia, serif" font-size="9" fill="#5C4330">
    <line x1="240" y1="145" x2="170" y2="145" stroke="#8B7355" stroke-width="0.5"/>
    <text x="100" y="143" font-size="9">Short sleeves (ʿaḍud)</text>
    
    <line x1="270" y1="120" x2="170" y2="100" stroke="#8B7355" stroke-width="0.5"/>
    <text x="108" y="98" font-size="9">Neck opening (jayb)</text>
    
    <line x1="300" y1="350" x2="200" y2="380" stroke="#8B7355" stroke-width="0.5"/>
    <text x="110" y="378" font-size="9">Knee-length hem (dhayl)</text>
    
    <line x1="370" y1="240" x2="470" y2="240" stroke="#8B7355" stroke-width="0.5"/>
    <text x="475" y="238" font-size="9">~15,000–30,000 rings</text>
    <text x="475" y="250" font-size="8" fill="#8B7355" font-style="italic">per coat of mail</text>
  </g>

  <!-- Dimension lines -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#8B7355">
    <line x1="155" y1="115" x2="155" y2="405" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="150" y1="115" x2="160" y2="115" stroke="#B8972D" stroke-width="0.5"/>
    <line x1="150" y1="405" x2="160" y2="405" stroke="#B8972D" stroke-width="0.5"/>
    <text x="143" y="260" text-anchor="end" transform="rotate(-90, 143, 260)">~85–95 cm (length)</text>
    
    <line x1="180" y1="170" x2="422" y2="170" stroke="#B8972D" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="300" y="185" text-anchor="middle">~90 cm (span, including sleeves)</text>
  </g>

  <!-- Material info -->
  <g font-family="Georgia, serif" font-size="10" fill="#5C4330">
    <text x="50" y="420" font-weight="bold">Material:</text>
    <text x="115" y="420">Wrought iron rings, riveted 4-in-1 pattern  |  Weight: ~9–12 kg</text>
    
    <text x="50" y="438" font-weight="bold">Provenance:</text>
    <text x="125" y="438">Pawned to Abū al-Shaḥm, a Jewish merchant, for 30 ṣāʿ of barley</text>
    
    <text x="50" y="456" font-weight="bold">Source:</text>
    <text x="105" y="456">al-Bukhārī, Jihād 89; Ibn Saʿd, al-Ṭabaqāt, I/486</text>
  </g>

  <text x="750" y="465" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#B8972D">DSM-WPN-003</text>
</svg>