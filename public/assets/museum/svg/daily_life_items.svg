<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <title>Günlük Yaşam Eşyaları / Daily Life Items — Mutfak ve Ticaret</title>
  <defs>
    <linearGradient id="copper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="50%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
    <linearGradient id="stone2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#757575"/>
    </linearGradient>
    <marker id="da" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="da-r" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5" fill="#555"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#FDF8F0"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C1810">Günlük Yaşam Eşyaları — Mutfak ve Ticaret</text>
  <text x="400" y="48" text-anchor="middle" font-size="13" fill="#666">Daily Life Items — Kitchen &amp; Commerce | أدوات الحياة اليومية</text>
  
  <!-- ============ 1. KAZAN (Cooking Pot) ============ -->
  <g transform="translate(140,180)">
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Bakır Kazan (Burme)</text>
    <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#666">Copper Cauldron | القِدْر</text>
    
    <!-- Pot body -->
    <ellipse cx="0" cy="0" rx="55" ry="15" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1.5"/>
    <path d="M -55 0 Q -58 40, -50 70 Q -30 85, 0 88 Q 30 85, 50 70 Q 58 40, 55 0" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="48" ry="12" fill="#CD7F32" opacity="0.5"/>
    
    <!-- Handles -->
    <path d="M -50 10 Q -70 5, -65 -10 Q -60 -20, -50 -5" fill="none" stroke="#6B3A1F" stroke-width="3"/>
    <path d="M 50 10 Q 70 5, 65 -10 Q 60 -20, 50 -5" fill="none" stroke="#6B3A1F" stroke-width="3"/>
    
    <!-- Dimensions -->
    <line x1="-55" y1="100" x2="55" y2="100" stroke="#555" stroke-width="0.7" marker-start="url(#da-r)" marker-end="url(#da)"/>
    <text x="0" y="113" text-anchor="middle" font-size="9" fill="#555">~30-50 cm çap</text>
    
    <line x1="70" y1="0" x2="70" y2="88" stroke="#555" stroke-width="0.7" marker-start="url(#da-r)" marker-end="url(#da)"/>
    <text x="82" y="50" font-size="8" fill="#555">~25-35</text>
    <text x="82" y="60" font-size="8" fill="#555">cm</text>
    
    <!-- Sacayak (tripod) -->
    <line x1="-30" y1="88" x2="-40" y2="120" stroke="#333" stroke-width="2.5"/>
    <line x1="30" y1="88" x2="40" y2="120" stroke="#333" stroke-width="2.5"/>
    <line x1="0" y1="88" x2="0" y2="120" stroke="#333" stroke-width="2.5"/>
    <text x="0" y="135" text-anchor="middle" font-size="8" fill="#333">Sacayak (Esâfî)</text>
    
    <!-- Fire indication -->
    <text x="0" y="148" text-anchor="middle" font-size="8" fill="#C0392B">🔥 odun ateşi</text>
    
    <text x="0" y="170" text-anchor="middle" font-size="8" fill="#888">DSM-DL-KAZ / 4-10 kişilik</text>
  </g>
  
  <!-- ============ 2. MIZAN (Balance Scales) ============ -->
  <g transform="translate(400,180)">
    <text x="0" y="-55" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Mîzân (Terazi)</text>
    <text x="0" y="-40" text-anchor="middle" font-size="10" fill="#666">Balance Scales | الميزان</text>
    
    <!-- Central pillar -->
    <rect x="-3" y="-25" width="6" height="100" fill="#8B7355" stroke="#6B5B3F" stroke-width="1"/>
    <rect x="-15" y="75" width="30" height="8" fill="#8B7355" stroke="#6B5B3F" stroke-width="1" rx="2"/>
    
    <!-- Beam -->
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#8B6914" stroke-width="3"/>
    
    <!-- Fulcrum -->
    <polygon points="0,-28 -6,-20 6,-20" fill="#8B6914" stroke="#6B5B3F" stroke-width="1"/>
    
    <!-- Left pan -->
    <line x1="-80" y1="-20" x2="-80" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="-65" y1="-20" x2="-65" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="-95" y1="-20" x2="-95" y2="15" stroke="#8B6914" stroke-width="1"/>
    <ellipse cx="-80" cy="20" rx="30" ry="8" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1"/>
    <text x="-80" y="40" text-anchor="middle" font-size="8" fill="#555">kefe (pan)</text>
    
    <!-- Right pan -->
    <line x1="80" y1="-20" x2="80" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="65" y1="-20" x2="65" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="95" y1="-20" x2="95" y2="15" stroke="#8B6914" stroke-width="1"/>
    <ellipse cx="80" cy="20" rx="30" ry="8" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1"/>
    <text x="80" y="40" text-anchor="middle" font-size="8" fill="#555">kefe (pan)</text>
    
    <!-- Weight stones -->
    <rect x="70" y="10" width="10" height="8" fill="url(#stone2)" stroke="#555" stroke-width="0.8" rx="1"/>
    <rect x="82" y="10" width="8" height="6" fill="url(#stone2)" stroke="#555" stroke-width="0.8" rx="1"/>
    
    <!-- Quran reference -->
    <rect x="-95" y="55" width="190" height="48" fill="#FFF8E7" stroke="#C4A882" stroke-width="0.8" rx="3"/>
    <text x="0" y="70" text-anchor="middle" font-size="9" fill="#C0392B" font-style="italic">وَأَقِيمُوا الْوَزْنَ بِالْقِسْطِ</text>
    <text x="0" y="83" text-anchor="middle" font-size="8" fill="#666">"Tartıyı adaletle yapın" (Rahmân 9)</text>
    <text x="0" y="95" text-anchor="middle" font-size="8" fill="#666">"Establish weight in justice"</text>
    
    <text x="0" y="120" text-anchor="middle" font-size="8" fill="#888">DSM-DL-MIZ / İki kefeli bakır terazi</text>
  </g>
  
  <!-- ============ 3. DEGIRMEN (Hand Mill) ============ -->
  <g transform="translate(660,180)">
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">El Değirmeni (Rahâ)</text>
    <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#666">Hand Mill | الرَّحى</text>
    
    <!-- Bottom stone -->
    <ellipse cx="0" cy="50" rx="50" ry="15" fill="url(#stone2)" stroke="#555" stroke-width="1.5"/>
    <rect x="-50" y="35" width="100" height="15" fill="#9E9E9E" stroke="#555" stroke-width="1"/>
    <ellipse cx="0" cy="35" rx="50" ry="15" fill="url(#stone2)" stroke="#555" stroke-width="1.5"/>
    
    <!-- Top stone (rotating) -->
    <ellipse cx="0" cy="20" rx="48" ry="14" fill="#BDBDBD" stroke="#555" stroke-width="1.5"/>
    <rect x="-48" y="8" width="96" height="12" fill="#BDBDBD" stroke="#555" stroke-width="1"/>
    <ellipse cx="0" cy="8" rx="48" ry="14" fill="#CCC" stroke="#555" stroke-width="1.5"/>
    
    <!-- Feed hole -->
    <ellipse cx="0" cy="8" rx="6" ry="3" fill="#666"/>
    
    <!-- Handle -->
    <rect x="30" y="-5" width="4" height="20" fill="#8B7355" stroke="#6B5B3F" stroke-width="1" rx="1"/>
    <circle cx="32" cy="-8" r="5" fill="#8B7355" stroke="#6B5B3F" stroke-width="1"/>
    
    <!-- Rotation arrow -->
    <path d="M 40 8 A 15 15 0 0 1 20 -5" fill="none" stroke="#C0392B" stroke-width="1.2" marker-end="url(#da)"/>
    <text x="50" y="0" font-size="7" fill="#C0392B">döndür</text>
    
    <!-- Grain output -->
    <text x="0" y="75" text-anchor="middle" font-size="8" fill="#8B6914">← un çıkışı →</text>
    
    <!-- Dimensions -->
    <line x1="-50" y1="65" x2="50" y2="65" stroke="#555" stroke-width="0.7" marker-start="url(#da-r)" marker-end="url(#da)"/>
    <text x="0" y="78" text-anchor="middle" font-size="9" fill="#555">~40-50 cm</text>
    
    <text x="0" y="108" text-anchor="middle" font-size="8" fill="#888">DSM-DL-DEG / Taş / ~15-25 kg</text>
    <text x="0" y="120" text-anchor="middle" font-size="8" fill="#888">Kadınlar tahıl öğütürdü</text>
  </g>
  
  <!-- ============ 4. MUHUR (Seal) ============ -->
  <g transform="translate(140,440)">
    <text x="0" y="-25" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Mühür (Hâtem)</text>
    <text x="0" y="-10" text-anchor="middle" font-size="10" fill="#666">Prophet's Seal | خاتم النبي ﷺ</text>
    
    <!-- Ring side view -->
    <ellipse cx="-40" cy="30" rx="18" ry="25" fill="none" stroke="#C0C0C0" stroke-width="3"/>
    <!-- Seal stone -->
    <ellipse cx="-40" cy="5" rx="10" ry="7" fill="#B22222" stroke="#8B0000" stroke-width="1"/>
    <text x="-40" y="8" text-anchor="middle" font-size="5" fill="#FFF">عقيق</text>
    
    <!-- Seal impression (top view) -->
    <circle cx="40" cy="30" r="22" fill="#F5F5DC" stroke="#8B6914" stroke-width="1.5"/>
    <text x="40" y="24" text-anchor="middle" font-size="7" fill="#2C1810">محمد</text>
    <text x="40" y="33" text-anchor="middle" font-size="7" fill="#2C1810">رسول</text>
    <text x="40" y="42" text-anchor="middle" font-size="7" fill="#2C1810">الله</text>
    
    <text x="75" y="20" font-size="8" fill="#555">← ters kazıma</text>
    <text x="75" y="30" font-size="8" fill="#555">(mühür baskısı)</text>
    
    <!-- Dimensions -->
    <text x="0" y="70" text-anchor="middle" font-size="9" fill="#555">çap ~15-20 mm | gümüş + akik taş</text>
    <text x="0" y="85" text-anchor="middle" font-size="8" fill="#888">DSM-DL-MUH / Topkapı Sarayı'nda muhafaza</text>
  </g>
  
  <!-- ============ 5. MISVAK ============ -->
  <g transform="translate(400,430)">
    <text x="0" y="-20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Misvak (Sivâk)</text>
    <text x="0" y="-5" text-anchor="middle" font-size="10" fill="#666">Tooth-cleaning Twig | السواك</text>
    
    <!-- Miswak stick -->
    <rect x="-80" y="15" width="160" height="8" fill="#8B7355" stroke="#6B5B3F" stroke-width="1" rx="3"/>
    <!-- Bristle end -->
    <path d="M 80 15 Q 90 12, 95 15 Q 100 18, 95 22 Q 90 25, 80 23" fill="#A08060" stroke="#6B5B3F" stroke-width="0.8"/>
    <line x1="82" y1="16" x2="92" y2="14" stroke="#C4A882" stroke-width="0.5"/>
    <line x1="82" y1="18" x2="93" y2="17" stroke="#C4A882" stroke-width="0.5"/>
    <line x1="82" y1="20" x2="93" y2="20" stroke="#C4A882" stroke-width="0.5"/>
    <line x1="82" y1="22" x2="92" y2="23" stroke="#C4A882" stroke-width="0.5"/>
    
    <!-- Dimensions -->
    <line x1="-80" y1="35" x2="80" y2="35" stroke="#555" stroke-width="0.7" marker-start="url(#da-r)" marker-end="url(#da)"/>
    <text x="0" y="48" text-anchor="middle" font-size="9" fill="#555">~15-20 cm | çap ~8-12 mm</text>
    
    <text x="100" y="38" font-size="8" fill="#8B6914">← lifli uç</text>
    <text x="100" y="48" font-size="7" fill="#888">(bristled tip)</text>
    
    <text x="0" y="65" text-anchor="middle" font-size="9" fill="#2C1810">Erâk ağacı (Salvadora persica)</text>
    <text x="0" y="80" text-anchor="middle" font-size="8" fill="#888">DSM-DL-MSK / Sünnet-i müekkede</text>
  </g>
  
  <!-- ============ 6. KANDIL ============ -->
  <g transform="translate(660,430)">
    <text x="0" y="-25" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C1810">Kandil (Sirâc)</text>
    <text x="0" y="-10" text-anchor="middle" font-size="10" fill="#666">Oil Lamp | السراج / المصباح</text>
    
    <!-- Lamp body -->
    <ellipse cx="0" cy="40" rx="25" ry="10" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1.5"/>
    <path d="M -25 40 Q -28 25, -20 15 Q -10 8, 0 8 Q 10 8, 20 15 Q 28 25, 25 40" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1"/>
    
    <!-- Spout -->
    <path d="M 20 15 L 35 10 L 35 18 L 22 20" fill="url(#copper)" stroke="#6B3A1F" stroke-width="1"/>
    
    <!-- Wick -->
    <line x1="35" y1="10" x2="35" y2="0" stroke="#333" stroke-width="1.5"/>
    <!-- Flame -->
    <path d="M 35 0 Q 32 -8, 35 -15 Q 38 -8, 35 0" fill="#FFD700" stroke="#FF8C00" stroke-width="0.8"/>
    
    <!-- Handle -->
    <path d="M -20 15 Q -35 5, -30 25 Q -28 35, -22 35" fill="none" stroke="#6B3A1F" stroke-width="2.5"/>
    
    <!-- Dimensions -->
    <text x="0" y="65" text-anchor="middle" font-size="9" fill="#555">~10-20 cm | toprak/bronz</text>
    <text x="0" y="80" text-anchor="middle" font-size="9" fill="#555">Yakıt: zeytinyağı</text>
    <text x="0" y="95" text-anchor="middle" font-size="8" fill="#888">DSM-DL-KAN / Nûr 35 metaforu</text>
  </g>
  
  <!-- Footer -->
  <line x1="50" y1="565" x2="750" y2="565" stroke="#C4A882" stroke-width="0.5"/>
  <text x="400" y="582" text-anchor="middle" font-size="9" fill="#888">Dijital Siyer Müzesi — Günlük Yaşam Koleksiyonu | Digital Sira Museum — Daily Life Collection</text>
</svg>
