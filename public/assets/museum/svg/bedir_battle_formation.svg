<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d2"/>
      <stop offset="100%" stop-color="#ddd0b4"/>
    </linearGradient>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#27ae60"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="700" height="600" fill="url(#bg1)"/>

  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Bedir Gazvesi Savaş Düzeni / Battle of Badr</text>
  <text x="350" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">17 Ramazan 2 H. / 13 Mart 624 CE</text>

  <!-- Terrain: Badr wells -->
  <ellipse cx="350" cy="290" rx="180" ry="30" fill="#d4e6f1" opacity="0.4" stroke="#85c1e9" stroke-width="1"/>
  <text x="350" y="295" text-anchor="middle" font-size="9" fill="#2980b9" font-style="italic">Bedir Kuyuları / Wells of Badr</text>

  <!-- Sand dunes (south) -->
  <path d="M50,480 Q150,460 250,475 Q350,455 450,470 Q550,450 650,465" fill="none" stroke="#c4a882" stroke-width="2" opacity="0.4"/>
  <text x="350" y="500" text-anchor="middle" font-size="8" fill="#a0896a">Kum Tepeleri / Sand Dunes</text>

  <!-- Mountain Udwat al-Quswa (NE) -->
  <path d="M520,80 Q560,55 600,75 Q640,50 680,70 L680,110 Q640,90 600,105 Q560,85 520,110Z" fill="#a0896a" stroke="#6d5b3e" stroke-width="1"/>
  <text x="600" y="100" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">Udvetü'l-Kusvâ</text>

  <!-- MÜSLÜMAN ORDUSU (north, green) -->
  <rect x="180" y="170" width="340" height="45" rx="6" fill="#27ae60" opacity="0.85" stroke="#1e8449" stroke-width="1.5"/>
  <text x="350" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MÜSLÜMAN ORDUSU (313 kişi)</text>
  <text x="350" y="204" text-anchor="middle" font-size="9" fill="#d5f5e3">Kmd: Hz. Muhammed ﷺ</text>

  <!-- Muslim sub-units -->
  <g font-size="8">
    <rect x="180" y="222" width="100" height="28" rx="4" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="230" y="237" text-anchor="middle" fill="#fff" font-weight="bold">Sol Kanat</text>
    <text x="230" y="255" text-anchor="middle" fill="#1e8449">Hz. Ali</text>

    <rect x="300" y="222" width="100" height="28" rx="4" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="350" y="237" text-anchor="middle" fill="#fff" font-weight="bold">Merkez</text>
    <text x="350" y="255" text-anchor="middle" fill="#1e8449">Hz. Peygamber ﷺ</text>

    <rect x="420" y="222" width="100" height="28" rx="4" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="470" y="237" text-anchor="middle" fill="#fff" font-weight="bold">Sağ Kanat</text>
    <text x="470" y="255" text-anchor="middle" fill="#1e8449">Sa'd b. Muâz</text>
  </g>

  <!-- Muslim HQ (arish/çardak) -->
  <g transform="translate(120,175)">
    <rect x="-30" y="-10" width="60" height="30" rx="4" fill="#f39c12" stroke="#d4ac0d" stroke-width="1"/>
    <text y="5" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">Arîş</text>
    <text y="15" text-anchor="middle" font-size="7" fill="#fff">Karargâh</text>
  </g>

  <!-- Selman strategy: wells blocked -->
  <g transform="translate(350,270)">
    <text text-anchor="middle" font-size="8" fill="#2980b9" font-style="italic">Habbâb b. Münzir önerisi: kuyuları kontrol et</text>
  </g>

  <!-- No-man's land -->
  <text x="350" y="330" text-anchor="middle" font-size="9" fill="#95a5a6" font-style="italic">~ Meydan ~</text>

  <!-- KUREYŞ ORDUSU (south, red) -->
  <rect x="130" y="370" width="440" height="50" rx="6" fill="#e74c3c" opacity="0.85" stroke="#c0392b" stroke-width="1.5"/>
  <text x="350" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">KUREYŞ ORDUSU (~950+ kişi)</text>
  <text x="350" y="406" text-anchor="middle" font-size="9" fill="#fadbd8">Kmd: Ebû Cehl (Amr b. Hişâm)</text>

  <!-- Quraysh sub-units -->
  <g font-size="8">
    <rect x="130" y="425" width="130" height="28" rx="4" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="195" y="440" text-anchor="middle" fill="#fff" font-weight="bold">Sol Kanat (Süvari)</text>
    <text x="195" y="458" text-anchor="middle" fill="#922b21">Ebû Cehl</text>

    <rect x="280" y="425" width="140" height="28" rx="4" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="350" y="440" text-anchor="middle" fill="#fff" font-weight="bold">Merkez (Piyade)</text>
    <text x="350" y="458" text-anchor="middle" fill="#922b21">Utbe b. Rebîa</text>

    <rect x="440" y="425" width="130" height="28" rx="4" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="505" y="440" text-anchor="middle" fill="#fff" font-weight="bold">Sağ Kanat</text>
    <text x="505" y="458" text-anchor="middle" fill="#922b21">Velîd b. Utbe</text>
  </g>

  <!-- Duel zone -->
  <g transform="translate(350,330)">
    <rect x="-75" y="-12" width="150" height="24" rx="12" fill="#f39c12" opacity="0.3" stroke="#d4ac0d" stroke-dasharray="4,3"/>
    <text y="4" text-anchor="middle" font-size="8" fill="#d4ac0d" font-weight="bold">Teke Tek Düello Alanı</text>
  </g>

  <!-- Muslim attack arrows -->
  <path d="M280,252 Q280,310 280,355" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)" opacity="0.6"/>
  <path d="M350,252 Q350,310 350,355" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)" opacity="0.6"/>
  <path d="M420,252 Q420,310 420,355" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)" opacity="0.6"/>

  <!-- Key events -->
  <g transform="translate(20,80)">
    <rect x="-10" y="-15" width="165" height="105" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="9" font-weight="bold" fill="#2c3e50">Savaş Seyri:</text>
    <text y="15" font-size="8" fill="#27ae60">① Teke tek düello başladı</text>
    <text y="29" font-size="8" fill="#27ae60">② Hz. Ali, Hz. Hamza galip</text>
    <text y="43" font-size="8" fill="#27ae60">③ Genel hücum emri</text>
    <text y="57" font-size="8" fill="#e74c3c">④ Ebû Cehl öldürüldü</text>
    <text y="71" font-size="8" fill="#27ae60">⑤ Kureyş bozgunu</text>
    <text y="85" font-size="8" fill="#2c3e50">⑥ 70 esir, 70 ölü (Kureyş)</text>
  </g>

  <!-- Casualties box -->
  <g transform="translate(520,510)">
    <rect x="-10" y="-15" width="170" height="70" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="9" font-weight="bold" fill="#2c3e50">Kayıplar / Casualties:</text>
    <text y="16" font-size="8" fill="#27ae60">Müslümanlar: 14 şehit</text>
    <text y="31" font-size="8" fill="#e74c3c">Kureyş: 70 ölü, 70 esir</text>
    <text y="46" font-size="7" fill="#7f8c8d">Sonuç: Kesin Müslüman zaferi</text>
  </g>

  <!-- Forces ratio -->
  <g transform="translate(20,510)">
    <rect x="-10" y="-15" width="170" height="50" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="9" font-weight="bold" fill="#2c3e50">Kuvvet Oranı:</text>
    <text y="16" font-size="8" fill="#27ae60">Müslümanlar: 313 (2 at, 70 deve)</text>
    <text y="31" font-size="8" fill="#e74c3c">Kureyş: ~950 (100 at, 700 deve)</text>
  </g>

  <g transform="translate(660,70)"><text font-size="10" font-weight="bold" fill="#c0392b">N ↑</text></g>
  <text x="350" y="590" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #20</text>
</svg>
