<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d2"/>
      <stop offset="100%" stop-color="#ddd0b4"/>
    </linearGradient>
    <pattern id="trenchPat" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#6d4c2a"/>
      <circle cx="4" cy="4" r="1.5" fill="#8b6914" opacity="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Hendek Gazvesi Savunma Hattı / Battle of the Trench</text>
  <text x="350" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">Şevvâl–Zilkade 5 H. / Mart–Nisan 627 CE</text>

  <!-- Medina city (center) -->
  <ellipse cx="350" cy="360" rx="130" ry="110" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" opacity="0.5"/>
  <text x="350" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">MEDİNE</text>
  <text x="350" y="348" text-anchor="middle" font-size="10" fill="#1e8449">المدينة المنوّرة</text>

  <!-- Mescid-i Nebevî (center point) -->
  <rect x="330" y="365" width="40" height="30" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="350" y="383" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">Mescid</text>

  <!-- Lava fields (Harre) — east and west natural barriers -->
  <!-- Harre-i Vebere (west) -->
  <path d="M100,250 Q80,320 90,400 Q85,470 100,520"
        fill="none" stroke="#4a4a4a" stroke-width="18" opacity="0.25" stroke-linecap="round"/>
  <text x="65" y="390" font-size="9" fill="#4a4a4a" font-weight="bold" transform="rotate(-90,65,390)">Harre-i Vebere (Lav)</text>

  <!-- Harre-i Vâkım (east) -->
  <path d="M600,250 Q620,320 610,400 Q615,470 600,520"
        fill="none" stroke="#4a4a4a" stroke-width="18" opacity="0.25" stroke-linecap="round"/>
  <text x="635" y="390" font-size="9" fill="#4a4a4a" font-weight="bold" transform="rotate(90,635,390)">Harre-i Vâkım (Lav)</text>

  <!-- Palm groves (south) -->
  <g fill="#2ecc71" opacity="0.4">
    <circle cx="250" cy="490" r="15"/><circle cx="290" cy="500" r="12"/>
    <circle cx="350" cy="510" r="18"/><circle cx="410" cy="500" r="14"/>
    <circle cx="450" cy="490" r="13"/>
  </g>
  <text x="350" y="535" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">Hurma Bahçeleri / Palm Groves</text>

  <!-- THE TRENCH (north side — main defense) -->
  <path d="M120,220 Q200,180 280,195 Q350,175 420,190 Q500,178 580,215"
        fill="none" stroke="url(#trenchPat)" stroke-width="14" stroke-linecap="round"/>
  <!-- Trench outline -->
  <path d="M120,220 Q200,180 280,195 Q350,175 420,190 Q500,178 580,215"
        fill="none" stroke="#6d4c2a" stroke-width="2" stroke-dasharray="none"/>
  <text x="350" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d4c2a">HENDEK / الخندق</text>

  <!-- Trench dimensions -->
  <g font-size="8" fill="#8b6914">
    <text x="350" y="215" text-anchor="middle">~5.5 km uzunluk × ~4.6 m genişlik × ~4.6 m derinlik</text>
  </g>

  <!-- Selmân-ı Fârisî annotation -->
  <g transform="translate(350,230)">
    <text text-anchor="middle" font-size="8" fill="#8e44ad" font-style="italic">Fikir: Selmân-ı Fârisî</text>
  </g>

  <!-- Muslim guard posts along trench -->
  <g fill="#27ae60" font-size="8">
    <circle cx="180" cy="210" r="5" stroke="#fff" stroke-width="1.5"/>
    <text x="180" y="200" text-anchor="middle" fill="#1e8449">●</text>
    <circle cx="280" cy="192" r="5" stroke="#fff" stroke-width="1.5"/>
    <circle cx="350" cy="185" r="7" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    <text x="350" y="188" text-anchor="middle" fill="#fff" font-weight="bold" font-size="6">HQ</text>
    <circle cx="420" cy="190" r="5" stroke="#fff" stroke-width="1.5"/>
    <circle cx="520" cy="205" r="5" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- AHZÂB / COALITION FORCES (north of trench) -->
  <!-- Kureyş (center) -->
  <rect x="250" y="80" width="200" height="40" rx="5" fill="#e74c3c" opacity="0.85" stroke="#c0392b" stroke-width="1.5"/>
  <text x="350" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Kureyş (4,000)</text>
  <text x="350" y="113" text-anchor="middle" font-size="8" fill="#fadbd8">Kmd: Ebû Süfyân</text>

  <!-- Gatafan (right/east) -->
  <rect x="480" y="100" width="140" height="35" rx="5" fill="#d35400" opacity="0.8" stroke="#a04000" stroke-width="1"/>
  <text x="550" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Gatafân (2,000)</text>
  <text x="550" y="130" text-anchor="middle" font-size="7" fill="#fdebd0">Uyeyne b. Hısn</text>

  <!-- Other tribes (left/west) -->
  <rect x="80" y="100" width="140" height="35" rx="5" fill="#d35400" opacity="0.8" stroke="#a04000" stroke-width="1"/>
  <text x="150" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Diğer Kabileler</text>
  <text x="150" y="130" text-anchor="middle" font-size="7" fill="#fdebd0">(4,000+)</text>

  <!-- Total coalition -->
  <text x="350" y="72" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">AHZÂB KOALİSYONU: ~10,000 kişi</text>

  <!-- Attack arrows (blocked by trench) -->
  <g stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5">
    <line x1="200" y1="135" x2="200" y2="200"/>
    <line x1="350" y1="120" x2="350" y2="175"/>
    <line x1="500" y1="135" x2="500" y2="200"/>
  </g>
  <g font-size="7" fill="#e74c3c">
    <text x="200" y="155" text-anchor="middle">✕</text>
    <text x="350" y="150" text-anchor="middle">✕</text>
    <text x="500" y="155" text-anchor="middle">✕</text>
  </g>

  <!-- Benî Kurayza (southeast — treachery) -->
  <g transform="translate(550,430)">
    <rect x="-55" y="-18" width="110" height="36" rx="5" fill="#8e44ad" opacity="0.8" stroke="#6c3483" stroke-width="1"/>
    <text y="-2" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Benî Kurayza</text>
    <text y="12" text-anchor="middle" font-size="7" fill="#d7bde2">Antlaşmayı bozdu</text>
  </g>
  <!-- Threat arrow from Banu Qurayza -->
  <path d="M530,425 Q480,400 440,380"
        fill="none" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="480" y="395" font-size="7" fill="#8e44ad">İç tehdit</text>

  <!-- Muslim forces info -->
  <g transform="translate(350,405)">
    <text text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">Müslüman Kuvvetleri: 3,000</text>
    <text y="14" text-anchor="middle" font-size="8" fill="#1e8449">Kmd: Hz. Muhammed ﷺ</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20,560)">
    <rect x="-10" y="-15" width="260" height="85" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="10" font-weight="bold" fill="#2c3e50">Açıklama / Legend</text>
    <rect x="0" y="12" width="20" height="8" rx="2" fill="#6d4c2a"/>
    <text x="25" y="20" font-size="8" fill="#2c3e50">Hendek (Selmân-ı Fârisî önerisi)</text>
    <rect x="0" y="28" width="20" height="8" rx="2" fill="#4a4a4a" opacity="0.4"/>
    <text x="25" y="36" font-size="8" fill="#2c3e50">Harre (doğal lav engeli)</text>
    <circle cx="10" cy="48" r="4" fill="#27ae60"/>
    <text x="25" y="52" font-size="8" fill="#2c3e50">Müslüman nöbet noktası</text>
    <text x="0" y="64" font-size="7" fill="#7f8c8d">Kuşatma süresi: ~27 gün (2 hafta yoğun)</text>
  </g>

  <!-- Outcome box -->
  <g transform="translate(400,560)">
    <rect x="-10" y="-15" width="290" height="85" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="10" font-weight="bold" fill="#2c3e50">Sonuç / Outcome</text>
    <text y="16" font-size="8" fill="#27ae60">✓ Hendek geçilemedi — savunma başarılı</text>
    <text y="30" font-size="8" fill="#2c3e50">✓ Şiddetli rüzgâr ve soğuk → koalisyon dağıldı</text>
    <text y="44" font-size="8" fill="#2c3e50">✓ Nuaym b. Mes'ûd'un diplomasisi etkili</text>
    <text y="58" font-size="8" fill="#8e44ad">→ Benî Kurayza muhasarası başladı</text>
  </g>

  <!-- North indicator -->
  <g transform="translate(660,65)">
    <text font-size="10" font-weight="bold" fill="#c0392b">N ↑</text>
  </g>

  <!-- Attribution -->
  <text x="350" y="645" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #19</text>
</svg>
