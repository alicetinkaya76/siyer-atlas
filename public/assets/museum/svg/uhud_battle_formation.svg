<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#a0896a"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#d5c4a1"/>
    </linearGradient>
    <marker id="arr2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#e74c3c"/>
    </marker>
    <marker id="arr3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="550" fill="url(#fieldGrad)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Uhud Gazvesi Savaş Düzeni / Battle of Uhud Formation</text>
  <text x="350" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">3 Şevvâl 3 H. / 23 Mart 625 CE</text>

  <!-- UHUD DAĞI (top, north) -->
  <path d="M50,80 Q150,40 250,75 Q350,30 450,70 Q550,35 650,80 L650,120 Q550,90 450,110 Q350,85 250,110 Q150,90 50,120 Z"
        fill="url(#mountainGrad)" stroke="#6d5b3e" stroke-width="1.5"/>
  <text x="350" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Uhud Dağı / جبل أحد</text>

  <!-- AYNEYN TEPESİ (left, strategic hill) -->
  <ellipse cx="130" cy="250" rx="55" ry="30" fill="#a0896a" stroke="#6d5b3e" stroke-width="1.5"/>
  <text x="130" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Ayneyn</text>
  <text x="130" y="258" text-anchor="middle" font-size="8" fill="#f0e6d2">Okçular Tepesi</text>
  <text x="130" y="270" text-anchor="middle" font-size="7" fill="#f0e6d2">عينين</text>

  <!-- 50 okçu (archers on hill) -->
  <g transform="translate(130,218)">
    <text text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="bold">50 Okçu</text>
    <text y="10" text-anchor="middle" font-size="7" fill="#8e44ad">Kmd: Abdullah b. Cübeyr</text>
  </g>
  <!-- Archer symbols -->
  <g fill="#8e44ad" font-size="9">
    <text x="105" y="240">🏹</text><text x="120" y="235">🏹</text><text x="135" y="238">🏹</text><text x="150" y="240">🏹</text>
  </g>

  <!-- MÜSLÜMAN ORDUSU (green, north side) -->
  <rect x="200" y="175" width="300" height="40" rx="5" fill="#27ae60" opacity="0.85" stroke="#1e8449" stroke-width="1.5"/>
  <text x="350" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">MÜSLÜMAN ORDUSU (700 kişi)</text>
  <text x="350" y="206" text-anchor="middle" font-size="9" fill="#d5f5e3">Kmd: Hz. Muhammed ﷺ</text>

  <!-- Muslim sub-units -->
  <g font-size="8" fill="#1e8449">
    <!-- Left wing -->
    <rect x="200" y="220" width="90" height="25" rx="3" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="245" y="234" text-anchor="middle" fill="#fff" font-weight="bold">Sol Kanat</text>
    <text x="245" y="250" text-anchor="middle" fill="#1e8449">Hz. Ali</text>
    <!-- Center -->
    <rect x="305" y="220" width="90" height="25" rx="3" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="350" y="234" text-anchor="middle" fill="#fff" font-weight="bold">Merkez</text>
    <text x="350" y="250" text-anchor="middle" fill="#1e8449">Hz. Hamza</text>
    <!-- Right wing -->
    <rect x="410" y="220" width="90" height="25" rx="3" fill="#2ecc71" opacity="0.7" stroke="#1e8449"/>
    <text x="455" y="234" text-anchor="middle" fill="#fff" font-weight="bold">Sağ Kanat</text>
    <text x="455" y="250" text-anchor="middle" fill="#1e8449">Zübeyr b. Avvâm</text>
  </g>

  <!-- No-man's land -->
  <text x="350" y="290" text-anchor="middle" font-size="9" fill="#95a5a6" font-style="italic">~ 300 m ara / gap ~</text>

  <!-- KUREYŞ ORDUSU (red, south side) -->
  <rect x="150" y="310" width="400" height="45" rx="5" fill="#e74c3c" opacity="0.85" stroke="#c0392b" stroke-width="1.5"/>
  <text x="350" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">KUREYŞ ORDUSU (3,000 kişi)</text>
  <text x="350" y="345" text-anchor="middle" font-size="9" fill="#fadbd8">Kmd: Ebû Süfyân b. Harb</text>

  <!-- Quraysh sub-units -->
  <g font-size="8">
    <rect x="150" y="360" width="120" height="25" rx="3" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="210" y="375" text-anchor="middle" fill="#fff" font-weight="bold">Sol Kanat</text>
    <text x="210" y="390" text-anchor="middle" fill="#922b21">İkrime b. Ebî Cehl</text>

    <rect x="290" y="360" width="120" height="25" rx="3" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="350" y="375" text-anchor="middle" fill="#fff" font-weight="bold">Merkez (Piyade)</text>
    <text x="350" y="390" text-anchor="middle" fill="#922b21">Ebû Süfyân</text>

    <rect x="430" y="360" width="120" height="25" rx="3" fill="#c0392b" opacity="0.7" stroke="#922b21"/>
    <text x="490" y="375" text-anchor="middle" fill="#fff" font-weight="bold">Sağ Kanat</text>
    <text x="490" y="390" text-anchor="middle" fill="#922b21">Hâlid b. Velîd</text>
  </g>

  <!-- SÜVARI (cavalry) -->
  <rect x="530" y="390" width="100" height="22" rx="3" fill="#d35400" opacity="0.8"/>
  <text x="580" y="405" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">200 Süvari</text>
  <text x="580" y="417" text-anchor="middle" font-size="7" fill="#e67e22">Hâlid b. Velîd</text>

  <!-- Khalid's flanking maneuver arrow -->
  <path d="M580,415 Q600,450 580,480 Q540,510 400,500 Q250,490 180,460 Q130,430 130,350 Q130,290 130,268"
        fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr2)" opacity="0.7"/>
  <text x="510" y="480" font-size="8" fill="#c0392b" font-weight="bold">Hâlid'in çevirme</text>
  <text x="510" y="492" font-size="8" fill="#c0392b">harekâtı (Faz 2)</text>

  <!-- Key events annotations -->
  <g transform="translate(550,140)">
    <rect x="-5" y="-15" width="145" height="95" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="9" font-weight="bold" fill="#2c3e50">Kilit Anlar:</text>
    <text y="14" font-size="8" fill="#27ae60">① Müslümanlar ilk saldırıda üstün</text>
    <text y="28" font-size="8" fill="#8e44ad">② Okçular tepeyi terk etti</text>
    <text y="42" font-size="8" fill="#e74c3c">③ Hâlid'in süvari çevirmesi</text>
    <text y="56" font-size="8" fill="#c0392b">④ Hz. Hamza şehit düştü</text>
    <text y="70" font-size="8" fill="#2c3e50">⑤ Hz. Peygamber yaralandı</text>
  </g>

  <!-- Casualties box -->
  <g transform="translate(25,420)">
    <rect x="-5" y="-15" width="135" height="65" rx="5" fill="#fff" opacity="0.85" stroke="#bdc3c7"/>
    <text font-size="9" font-weight="bold" fill="#2c3e50">Kayıplar / Casualties:</text>
    <text y="15" font-size="8" fill="#27ae60">Müslümanlar: 70 şehit</text>
    <text y="30" font-size="8" fill="#e74c3c">Kureyş: 37 ölü</text>
    <text y="45" font-size="7" fill="#7f8c8d">Sonuç: Taktik yenilgi, stratejik denge</text>
  </g>

  <!-- North indicator -->
  <g transform="translate(30,35)">
    <text font-size="10" font-weight="bold" fill="#c0392b">N ↑</text>
    <text y="12" font-size="8" fill="#7f8c8d">(Medîne)</text>
  </g>

  <!-- Attribution -->
  <text x="350" y="540" text-anchor="middle" font-size="7" fill="#bdc3c7">Dijital Siyer Müzesi — v0.7.0 — SVG #18</text>
</svg>
