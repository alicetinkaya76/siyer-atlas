<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Siyer Atlası</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Saves the full path to sessionStorage, then redirects to index.html
    // The script in index.html picks it up and restores the route
    var fullPath = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa-redirect', fullPath);
    // Redirect to the app root (keeping the /siyer-atlas/ base)
    var base = '/siyer-atlas/';
    window.location.replace(base);
  </script>
</head>
<body></body>
</html>
